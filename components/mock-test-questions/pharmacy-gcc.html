<!-- Pharmacy GCC Prometric/Pearson VUE Mock Test Question Bank -->
<!-- Flat structure: 5 Tests, ~25 questions each, no category/topic nesting -->
<script type="application/x-exam-questions">
[
  { name: 'Test 1', icon: 'fa-file-lines', color: '#06b6d4', questions: [
      { q:'A 58-year-old man presents to the emergency department with crushing chest pain radiating to his left arm. ECG confirms ST-elevation myocardial infarction (STEMI). He has no history of aspirin allergy. Which medication should be administered immediately?', opts:['Warfarin','Aspirin (chewed)','Atorvastatin after discharge','Enalapril'], ans:1, exp:'Chewed aspirin (160–325 mg) should be given immediately in suspected STEMI because it rapidly inhibits platelet aggregation and significantly reduces mortality. ACE inhibitors and statins are important but are not the first emergency intervention.' },
      { q:'A 67-year-old diabetic patient using insulin arrives at the pharmacy sweating, confused, and trembling. His blood glucose is 42 mg/dL, and he is conscious. What is the pharmacist\'s best immediate action?', opts:['Inject insulin','Give 15–20 g of fast-acting glucose','Advise him to eat dinner','Refer without treatment'], ans:1, exp:'Conscious patients with hypoglycemia should receive approximately 15 g of rapid-acting carbohydrate (e.g., glucose tablets or juice). Blood glucose should be rechecked after 15 minutes.' },
      { q:'A patient with community-acquired pneumonia reports developing anaphylaxis after taking penicillin several years ago. Which antibiotic is the safest option?', opts:['Amoxicillin','Piperacillin','Azithromycin','Ampicillin'], ans:2, exp:'Patients with a history of penicillin-induced anaphylaxis should avoid penicillins. A macrolide such as azithromycin is an appropriate alternative depending on the clinical situation and local resistance patterns.' },
      { q:'A 72-year-old patient taking warfarin is prescribed metronidazole for a dental infection. What is the most likely consequence?', opts:['Decreased INR','Increased INR and bleeding risk','No interaction','Increased clot formation'], ans:1, exp:'Metronidazole inhibits warfarin metabolism, increasing INR and the risk of bleeding. Close INR monitoring and dose adjustment are required.' },
      { q:'A patient with COPD is prescribed salbutamol and budesonide inhalers. Which counseling point is MOST appropriate?', opts:['Use budesonide first.','Use salbutamol first, then budesonide.','Use both simultaneously.','Use budesonide only during attacks.'], ans:1, exp:'The bronchodilator opens the airways first, allowing the inhaled corticosteroid to reach deeper into the lungs. Patients should also rinse their mouth after using budesonide to reduce oral candidiasis.' },
      { q:'A 75-year-old man has: Serum Creatinine = 3.2 mg/dL, eGFR = 22 mL/min. The physician prescribes metformin. What should the pharmacist do?', opts:['Dispense normally.','Double the dose.','Contact the physician because metformin is contraindicated.','Recommend taking it with food.'], ans:2, exp:'Metformin is generally contraindicated when eGFR is below 30 mL/min/1.73 m² because of the increased risk of lactic acidosis.' },
      { q:'A 24-year-old asthmatic patient reports using his salbutamol inhaler 5–6 times every day for the past two weeks. What is the BEST recommendation?', opts:['Continue current treatment.','Increase salbutamol dose.','Refer the patient because asthma is poorly controlled.','Stop all inhalers.'], ans:2, exp:'Frequent use of a short-acting β₂-agonist indicates poor asthma control and the need for reassessment, including optimization of controller therapy.' },
      { q:'An 8-week pregnant woman has hypertension. Which medication should be avoided?', opts:['Methyldopa','Labetalol','Enalapril','Nifedipine'], ans:2, exp:'ACE inhibitors are contraindicated during pregnancy because they can cause fetal renal injury, oligohydramnios, and fetal death.' },
      { q:'A 78-year-old patient taking digoxin complains of nausea, vomiting, yellow vision, and palpitations. Which electrolyte abnormality most likely contributed?', opts:['Hyperkalemia','Hypernatremia','Hypokalemia','Hypermagnesemia'], ans:2, exp:'Low potassium enhances digoxin binding to the Na⁺/K⁺-ATPase pump, increasing the risk of toxicity.' },
      { q:'A physician prescribes: Simvastatin 40 mg daily, Clarithromycin 500 mg twice daily. What is the BEST pharmacist intervention?', opts:['Dispense without changes.','Recommend separating administration times.','Contact the physician because the combination increases the risk of severe myopathy and rhabdomyolysis.','Advise taking simvastatin in the morning.'], ans:2, exp:'Clarithromycin strongly inhibits CYP3A4, leading to increased simvastatin concentrations and a significantly higher risk of myopathy and rhabdomyolysis. The pharmacist should recommend temporarily withholding simvastatin or selecting an alternative antibiotic.' },
      { q:'A 68-year-old man with chronic heart failure is taking furosemide. During follow-up, he complains of muscle weakness and leg cramps. Laboratory tests show: Potassium = 2.9 mEq/L, Sodium = 138 mEq/L. What is the most likely cause?', opts:['Hyperkalemia','Furosemide-induced hypokalemia','Hyponatremia','Digoxin toxicity'], ans:1, exp:'Loop diuretics increase urinary potassium loss, leading to hypokalemia, which commonly causes muscle weakness, cramps, fatigue, and cardiac arrhythmias.' },
      { q:'A 30-year-old woman asks for an over-the-counter medicine for a sore throat. She has had fever (39.5°C), swollen cervical lymph nodes, and difficulty swallowing for two days. What is the pharmacist\'s BEST action?', opts:['Recommend lozenges only.','Recommend ibuprofen only.','Refer the patient to a physician.','Dispense antibiotics without prescription.'], ans:2, exp:'High fever and cervical lymphadenopathy suggest possible streptococcal pharyngitis, requiring medical evaluation. Antibiotics should not be supplied without a prescription.' },
      { q:'A patient taking warfarin presents with an INR of 7.8 but has no signs of bleeding. What is the most appropriate management?', opts:['Continue warfarin.','Increase warfarin dose.','Hold warfarin and notify the physician.','Give aspirin.'], ans:2, exp:'An INR above the therapeutic range significantly increases bleeding risk. Warfarin should be withheld, and the physician should determine whether vitamin K is indicated.' },
      { q:'A patient with severe renal impairment is prescribed gentamicin. What parameter should be monitored MOST closely?', opts:['Blood glucose','Liver enzymes','Serum creatinine','Platelet count'], ans:2, exp:'Gentamicin is nephrotoxic. Renal function and drug levels (where available) should be monitored to minimize toxicity.' },
      { q:'A patient taking amlodipine reports swollen ankles. Which adverse effect is MOST likely responsible?', opts:['Hypoglycemia','Peripheral edema','Hyperkalemia','Bradycardia'], ans:1, exp:'Peripheral edema is a common dose-related adverse effect of dihydropyridine calcium channel blockers due to arteriolar vasodilation.' },
      { q:'A patient taking metformin complains of severe diarrhea and abdominal discomfort after starting treatment. What is the BEST recommendation?', opts:['Stop permanently.','Take with meals.','Double the dose.','Switch immediately to insulin.'], ans:1, exp:'Gastrointestinal side effects are common when initiating metformin. Taking it with food or using an extended-release formulation often improves tolerability.' },
      { q:'A patient develops facial swelling and difficulty breathing immediately after receiving ceftriaxone. What type of hypersensitivity reaction is this?', opts:['Type II','Type III','Type I','Type IV'], ans:2, exp:'Immediate IgE-mediated hypersensitivity reactions include urticaria, angioedema, bronchospasm, and anaphylaxis.' },
      { q:'A patient asks which medication directly reduces nicotine cravings by partially stimulating nicotine receptors.', opts:['Bupropion','Nicotine gum','Varenicline','Fluoxetine'], ans:2, exp:'Varenicline is a partial agonist at α4β2 nicotinic acetylcholine receptors, reducing cravings and withdrawal symptoms while blocking nicotine\'s rewarding effects.' },
      { q:'A patient with symptoms of the common cold requests antibiotics. What is the BEST pharmacist response?', opts:['Dispense azithromycin.','Dispense amoxicillin.','Explain that antibiotics are ineffective against viral infections.','Recommend ciprofloxacin.'], ans:2, exp:'The common cold is caused by viruses. Unnecessary antibiotic use contributes to antimicrobial resistance and adverse effects.' },
      { q:'A patient taking NSAIDs develops epigastric pain and is diagnosed with a gastric ulcer. Which medication promotes ulcer healing by suppressing gastric acid secretion?', opts:['Magnesium hydroxide','Omeprazole','Sucralfate only','Simethicone'], ans:1, exp:'Proton pump inhibitors are the most effective agents for healing NSAID-associated gastric ulcers by markedly reducing gastric acid secretion.' },
      { q:'A patient taking atorvastatin reports muscle pain and dark-colored urine. What should the pharmacist suspect?', opts:['Hepatitis','Rhabdomyolysis','Kidney stones','Gout'], ans:1, exp:'Severe muscle pain with dark urine suggests rhabdomyolysis, a rare but serious statin-associated adverse effect requiring urgent evaluation.' },
      { q:'Which vaccine is recommended annually for adults aged 65 years and older?', opts:['HPV','Influenza vaccine','Varicella vaccine','Rotavirus vaccine'], ans:1, exp:'Annual influenza vaccination reduces hospitalization and mortality in older adults and those with chronic medical conditions.' },
      { q:'A patient repeatedly wakes at night because of asthma symptoms despite regular use of an inhaled corticosteroid. What is the next appropriate step?', opts:['Stop corticosteroid therapy.','Add a long-acting β₂-agonist (LABA) in combination with the inhaled corticosteroid.','Use antibiotics daily.','Increase salbutamol use alone.'], ans:1, exp:'Persistent symptoms despite inhaled corticosteroid therapy indicate the need for step-up treatment. A LABA should always be used in combination with an inhaled corticosteroid in asthma.' },
      { q:'A pharmacist discovers that the wrong strength of insulin has been dispensed before the patient leaves the pharmacy. What is the FIRST action?', opts:['Ignore the error.','Immediately replace the medication with the correct strength and document the incident according to pharmacy policy.','Wait until the patient notices.','Ask another pharmacist to explain.'], ans:1, exp:'The pharmacist should correct the error before the medication reaches the patient and follow institutional procedures for documentation and quality improvement.' },
      { q:'A patient started ramipril two weeks ago and now has a persistent dry cough. What is the BEST recommendation?', opts:['Continue ramipril because the cough will always resolve.','Switch to losartan after discussing with the prescriber.','Add a cough suppressant only.','Stop all antihypertensive medications.'], ans:1, exp:'ACE inhibitor–induced cough is caused by bradykinin accumulation. An angiotensin receptor blocker (ARB), such as losartan, provides similar cardiovascular benefits with a much lower risk of cough.' }
    ]
  },
  { name: 'Test 2', icon: 'fa-file-lines', color: '#3b82f6', questions: [
      { q:'A 62-year-old man with type 2 diabetes has persistent hypertension (BP 152/94 mmHg) and microalbuminuria. Which antihypertensive provides the greatest renal protection?', opts:['Amlodipine','Hydrochlorothiazide','Lisinopril','Atenolol'], ans:2, exp:'ACE inhibitors reduce intraglomerular pressure and slow the progression of diabetic nephropathy.' },
      { q:'A patient stabilized on warfarin starts taking ginkgo biloba without informing the healthcare provider. What is the most likely concern?', opts:['Hyperglycemia','Increased bleeding risk','Hypertension','Bradycardia'], ans:1, exp:'Ginkgo has antiplatelet activity and may increase the risk of bleeding when combined with warfarin.' },
      { q:'A mother requests an antidiarrheal medicine for her 3-year-old child with acute diarrhea. The child is alert with mild dehydration. What is the BEST recommendation?', opts:['Loperamide','Oral rehydration solution (ORS) and zinc supplementation','Ciprofloxacin','Diphenoxylate'], ans:1, exp:'ORS is the cornerstone of treatment for pediatric acute diarrhea. Zinc supplementation shortens the duration and severity of diarrhea. Antimotility agents are generally avoided in young children.' },
      { q:'A patient uses a salbutamol inhaler more than four times daily and has frequent nighttime symptoms. What does this indicate?', opts:['Well-controlled asthma','Poor asthma control','Drug allergy','COPD exacerbation'], ans:1, exp:'Frequent use of a rescue inhaler and nighttime symptoms indicate uncontrolled asthma requiring reassessment and optimization of controller therapy.' },
      { q:'A physician prescribes amoxicillin for a patient with infectious mononucleosis. What adverse effect is most likely?', opts:['Severe hypertension','Maculopapular rash','Hyperkalemia','Bradycardia'], ans:1, exp:'Patients with Epstein–Barr virus infection frequently develop a characteristic rash when treated with aminopenicillins such as amoxicillin.' },
      { q:'A patient with heart failure is prescribed spironolactone in addition to lisinopril. Which laboratory value requires close monitoring?', opts:['Potassium','Calcium','Chloride','Phosphate'], ans:0, exp:'Both ACE inhibitors and spironolactone increase serum potassium, raising the risk of hyperkalemia.' },
      { q:'A patient taking insulin becomes unconscious due to severe hypoglycemia. Which medication should be administered immediately if IV access is unavailable?', opts:['Insulin lispro','Glucagon IM','Metformin','Glimepiride'], ans:1, exp:'Intramuscular glucagon is indicated for severe hypoglycemia in unconscious patients when intravenous dextrose is not immediately available.' },
      { q:'A prescription reads: Morphine 10 mg IV every 4 hours PRN pain. The patient has a documented allergy causing anaphylaxis to morphine. What should the pharmacist do?', opts:['Dispense the medication.','Contact the prescriber immediately.','Reduce the dose.','Administer with an antihistamine.'], ans:1, exp:'A documented anaphylactic reaction is a contraindication. The pharmacist should clarify the order and recommend an appropriate alternative.' },
      { q:'A patient taking apixaban asks if routine INR monitoring is required. What is the correct response?', opts:['Yes, weekly INR monitoring is mandatory.','INR monitoring is generally not required with apixaban.','INR should be checked daily.','INR monitoring is required only with food intake.'], ans:1, exp:'Direct oral anticoagulants (DOACs) such as apixaban do not require routine INR monitoring, unlike warfarin.' },
      { q:'A patient complains of muscle pain after starting simvastatin. Which laboratory test is most appropriate?', opts:['Serum amylase','Creatine kinase (CK)','Bilirubin','Troponin I'], ans:1, exp:'Elevated CK levels support the diagnosis of statin-associated myopathy or rhabdomyolysis.' },
      { q:'A patient taking omeprazole for several years may develop deficiency of which vitamin?', opts:['Vitamin A','Vitamin B12','Vitamin C','Vitamin K'], ans:1, exp:'Long-term proton pump inhibitor use may reduce vitamin B12 absorption by decreasing gastric acid secretion.' },
      { q:'A child weighing 18 kg presents with fever. What is the recommended single dose of paracetamol?', opts:['90–270 mg','500 mg','1 g','750 mg'], ans:0, exp:'The recommended dose is 10–15 mg/kg per dose. For an 18-kg child, this equals 180–270 mg, making option A the best range provided.' },
      { q:'Which anti-tuberculosis medication commonly causes orange-red discoloration of urine and tears?', opts:['Isoniazid','Rifampicin','Ethambutol','Pyrazinamide'], ans:1, exp:'Rifampicin harmlessly discolors body fluids orange-red. Patients should be counseled about this expected effect.' },
      { q:'Which counseling point is correct for alendronate?', opts:['Take with milk.','Lie down immediately after taking.','Take with a full glass of water and remain upright for at least 30 minutes.','Crush before swallowing.'], ans:2, exp:'This minimizes the risk of esophageal irritation and improves absorption.' },
      { q:'A patient with COPD asks about smoking cessation. Which medication is a partial nicotinic receptor agonist?', opts:['Nicotine gum','Bupropion','Varenicline','Fluoxetine'], ans:2, exp:'Varenicline partially stimulates α4β2 nicotinic receptors, reducing cravings and withdrawal symptoms.' },
      { q:'Which medication is most likely to cause hyperkalemia?', opts:['Hydrochlorothiazide','Furosemide','Spironolactone','Bumetanide'], ans:2, exp:'Spironolactone is a potassium-sparing diuretic and may significantly increase serum potassium.' },
      { q:'A pregnant woman asks whether she can take isotretinoin for acne. What is the BEST advice?', opts:['It is completely safe.','It is contraindicated because of severe teratogenicity.','Reduce the dose by half.','Take it only during the third trimester.'], ans:1, exp:'Isotretinoin is highly teratogenic and is contraindicated during pregnancy.' },
      { q:'Which medication is the first-line treatment for status epilepticus?', opts:['Phenytoin','Diazepam (or another benzodiazepine)','Carbamazepine','Valproate'], ans:1, exp:'Benzodiazepines are first-line because they rapidly terminate ongoing seizures.' },
      { q:'A patient develops severe watery diarrhea after completing a course of clindamycin. Which organism is most likely responsible?', opts:['Escherichia coli','Clostridioides difficile','Salmonella typhi','Staphylococcus aureus'], ans:1, exp:'Clindamycin is strongly associated with C. difficile infection, which can cause pseudomembranous colitis.' },
      { q:'A patient taking hydrochlorothiazide reports recurrent gout attacks. Which adverse effect explains this?', opts:['Hypercalcemia','Hyperuricemia','Hypoglycemia','Hypernatremia'], ans:1, exp:'Thiazide diuretics reduce uric acid excretion, increasing the risk of gout.' },
      { q:'A physician orders 1 g of ceftriaxone IV. The vial contains 500 mg. How many vials are required?', opts:['One-half vial','One vial','Two vials','Three vials'], ans:2, exp:'One gram equals 1000 mg. Two 500-mg vials are needed to prepare the prescribed dose.' },
      { q:'A patient taking sildenafil asks whether it can be taken with sublingual nitroglycerin. What is the correct advice?', opts:['Yes, they are safe together.','They should be separated by 30 minutes.','They should not be taken together because of the risk of profound hypotension.','Take nitroglycerin only after meals.'], ans:2, exp:'Combining phosphodiesterase-5 inhibitors with nitrates can cause life-threatening hypotension.' },
      { q:'A pharmacist identifies a serious unexpected adverse drug reaction. What is the MOST appropriate action?', opts:['Ignore the reaction.','Report it through the national pharmacovigilance system according to local regulations.','Tell only the patient.','Wait for another similar case before reporting.'], ans:1, exp:'Pharmacists play a key role in pharmacovigilance by promptly reporting suspected serious or unexpected adverse drug reactions.' },
      { q:'A patient requests an antibiotic for a viral upper respiratory tract infection. What is the pharmacist\'s BEST response?', opts:['Dispense amoxicillin.','Dispense azithromycin.','Explain that antibiotics are ineffective for viral infections and recommend supportive care if appropriate.','Dispense ciprofloxacin.'], ans:2, exp:'Antibiotics should not be used for viral infections because they provide no benefit and contribute to antimicrobial resistance.' },
      { q:'A patient receiving metronidazole asks if alcohol is allowed during treatment. What is the BEST advice?', opts:['Alcohol is safe in moderation.','Avoid alcohol during treatment and for at least 48–72 hours after the last dose because of the risk of a disulfiram-like reaction.','Alcohol improves the effectiveness of metronidazole.','Alcohol is only contraindicated with topical metronidazole.'], ans:1, exp:'Combining metronidazole with alcohol may cause flushing, nausea, vomiting, tachycardia, and hypotension. Patients should avoid alcohol during therapy and for a short period after completing treatment.' },
      { q:'A 72-year-old man with hypertension and osteoarthritis presents with reduced urine output. His medications include lisinopril, hydrochlorothiazide, and ibuprofen (started one week ago). Serum creatinine has increased from 1.0 to 2.5 mg/dL. Which medication most likely precipitated the acute kidney injury?', opts:['Hydrochlorothiazide','Lisinopril','Ibuprofen','Aspirin'], ans:2, exp:'NSAIDs constrict the afferent arteriole by inhibiting prostaglandin synthesis, reducing renal blood flow. Combined with an ACE inhibitor and a diuretic ("triple whammy"), they markedly increase the risk of acute kidney injury.' }
    ]
  },
  { name: 'Test 3', icon: 'fa-file-lines', color: '#7c3aed', questions: [
      { q:'A 24-year-old woman presents to the emergency department with severe shortness of breath. She is unable to complete full sentences. Her respiratory rate is 34 breaths/min, oxygen saturation is 88% on room air, and she has widespread bilateral wheezing. She has already used her salbutamol inhaler several times without relief. Which treatment should be initiated FIRST?', opts:['Oral montelukast','Nebulized salbutamol with oxygen','Inhaled budesonide only','Oral amoxicillin'], ans:1, exp:'This patient has a severe acute asthma exacerbation. Immediate treatment includes oxygen therapy and repeated doses of a short-acting β₂-agonist (e.g., nebulized salbutamol). Systemic corticosteroids should also be started early, but bronchodilation and oxygen are the immediate priorities.' },
      { q:'A 72-year-old patient with chronic heart failure is taking furosemide 40 mg daily. Over the last three days, he has noticed increasing ankle swelling, shortness of breath while lying flat, and a weight gain of 3.5 kg. Which finding most strongly suggests worsening heart failure?', opts:['Mild headache','Weight gain of 3.5 kg','Dry mouth','Blurred vision'], ans:1, exp:'Rapid weight gain over a few days reflects fluid retention and is one of the earliest signs of worsening heart failure.' },
      { q:'A 69-year-old woman taking warfarin develops black tarry stools and dizziness. Her INR is 6.8. What should the pharmacist recommend?', opts:['Continue warfarin','Skip one dose only','Immediate emergency referral','Drink more water'], ans:2, exp:'Melena with a markedly elevated INR indicates major bleeding. This is a medical emergency requiring urgent assessment and reversal of anticoagulation.' },
      { q:'A 58-year-old man with type 2 diabetes takes metformin 1000 mg twice daily. He is scheduled for a CT scan with iodinated contrast tomorrow. His eGFR is 32 mL/min/1.73 m². What is the pharmacist\'s BEST recommendation?', opts:['Continue metformin normally.','Stop metformin around the time of contrast administration and restart only after renal function is reassessed.','Double the metformin dose.','Replace metformin with glibenclamide immediately.'], ans:1, exp:'Patients with reduced renal function receiving iodinated contrast are at increased risk of contrast-associated acute kidney injury. Temporarily withholding metformin helps reduce the risk of lactic acidosis if renal function deteriorates.' },
      { q:'A mother requests cough syrup for her 2-year-old child who has had a cough for two days. Which is the BEST recommendation?', opts:['Dextromethorphan','Codeine syrup','Avoid OTC cough suppressants and recommend supportive care; refer if red-flag symptoms are present.','Diphenhydramine'], ans:2, exp:'Routine OTC cough suppressants are generally not recommended for children under 4 years because of limited benefit and the potential for harm.' },
      { q:'A patient receiving simvastatin is prescribed clarithromycin. Which complication is MOST concerning?', opts:['Hyperglycemia','Rhabdomyolysis','Hypertension','Hyperthyroidism'], ans:1, exp:'Clarithromycin strongly inhibits CYP3A4, increasing simvastatin concentrations and the risk of severe muscle toxicity.' },
      { q:'A patient taking clindamycin develops profuse watery diarrhea with abdominal cramps. What should the pharmacist suspect?', opts:['Viral gastroenteritis','Clostridioides difficile infection','Food poisoning','Irritable bowel syndrome'], ans:1, exp:'Clindamycin is one of the antibiotics most strongly associated with C. difficile infection.' },
      { q:'A 45-year-old patient recently started ramipril. Two weeks later, he reports a persistent dry cough. What is the BEST recommendation?', opts:['Add a cough suppressant.','Continue ramipril indefinitely.','Discuss switching to an ARB such as losartan with the prescriber.','Stop all antihypertensive therapy.'], ans:2, exp:'ACE inhibitor–induced cough is related to bradykinin accumulation. ARBs provide similar cardiovascular and renal benefits with a much lower incidence of cough.' },
      { q:'A patient requests an early refill of tramadol, stating that the medication was "lost." What is the pharmacist\'s BEST first action?', opts:['Dispense the medication immediately.','Verify the patient\'s medication history and follow legal and institutional controlled-substance policies before dispensing.','Recommend taking ibuprofen instead.','Call the police immediately.'], ans:1, exp:'Controlled substances require careful verification to prevent misuse while ensuring legitimate patients receive appropriate care.' },
      { q:'A 6-year-old child weighing 20 kg has acute otitis media. Amoxicillin is prescribed at 90 mg/kg/day, divided into two doses. What is the total daily dose?', opts:['900 mg','1200 mg','1800 mg','2000 mg'], ans:2, exp:'90 mg/kg/day × 20 kg = 1800 mg/day, typically given as 900 mg twice daily.' },
      { q:'A patient has: Serum creatinine = 3.8 mg/dL, eGFR = 18 mL/min/1.73 m². Which medication should generally be avoided?', opts:['Amlodipine','Metformin','Aspirin (low dose)','Atorvastatin'], ans:1, exp:'Metformin is generally contraindicated in patients with an eGFR below 30 mL/min/1.73 m² because of the increased risk of lactic acidosis.' },
      { q:'A patient receiving high-dose chemotherapy asks about receiving the MMR vaccine. What is the BEST recommendation?', opts:['Administer the vaccine immediately.','Administer a double dose.','Delay the live vaccine until the patient is no longer significantly immunosuppressed, based on current recommendations.','The vaccine has no restrictions.'], ans:2, exp:'Live vaccines are generally contraindicated during significant immunosuppression because of the risk of vaccine-associated infection.' },
      { q:'A patient arrives unconscious after a heroin overdose. Respiratory rate: 6/min. Pinpoint pupils are noted. Which medication should be administered immediately?', opts:['Flumazenil','Naloxone','Atropine','Physostigmine'], ans:1, exp:'Naloxone is a competitive opioid receptor antagonist that rapidly reverses opioid-induced respiratory depression.' },
      { q:'A patient taking digoxin presents with nausea, vomiting, blurred yellow vision, and an irregular heartbeat. Which medication could have increased the risk of this toxicity?', opts:['Furosemide','Vitamin C','Paracetamol','Calcium carbonate'], ans:0, exp:'Furosemide can cause hypokalemia, which increases myocardial sensitivity to digoxin and raises the risk of digoxin toxicity.' },
      { q:'A 66-year-old man arrives at the emergency department 90 minutes after the sudden onset of right-sided weakness and slurred speech. A CT scan rules out intracranial hemorrhage. His blood pressure is 168/96 mmHg, and his blood glucose is 118 mg/dL. Which intervention is most appropriate if there are no contraindications?', opts:['Aspirin immediately before further evaluation','Intravenous thrombolytic therapy within the eligible treatment window','Warfarin immediately','Clopidogrel and discharge home'], ans:1, exp:'The patient presents within the treatment window for an acute ischemic stroke. After hemorrhage has been excluded and eligibility confirmed, intravenous thrombolytic therapy should be considered promptly. Aspirin is typically delayed for patients receiving thrombolysis.' },
      { q:'A 70-year-old woman presents with fever, hypotension (BP 82/48 mmHg), tachycardia, and confusion. Blood cultures have been collected. What is the next priority?', opts:['Wait for culture results before starting antibiotics','Start broad-spectrum intravenous antibiotics as soon as possible after cultures are obtained','Give oral antibiotics only','Observe for 24 hours'], ans:1, exp:'Early administration of broad-spectrum antibiotics after obtaining appropriate cultures is associated with improved outcomes in sepsis. Delaying treatment increases mortality.' },
      { q:'A 76-year-old patient taking digoxin and furosemide presents with nausea, vomiting, visual disturbances, and palpitations. Laboratory tests show potassium of 2.8 mEq/L. Which factor most likely precipitated the toxicity?', opts:['Hypernatremia','Hypokalemia caused by furosemide','Hypercalcemia','Hypertension'], ans:1, exp:'Low potassium enhances digoxin binding to the Na⁺/K⁺-ATPase pump, increasing the risk of toxicity. Loop diuretics commonly cause potassium loss.' },
      { q:'A 28-year-old woman asks for emergency contraception. She had unprotected sexual intercourse 48 hours ago and has no significant medical history. Which recommendation is most appropriate?', opts:['Levonorgestrel emergency contraceptive pill','Combined oral contraceptive starting next month only','Amoxicillin','Folic acid only'], ans:0, exp:'Levonorgestrel emergency contraception is most effective when taken as soon as possible and is indicated within 72 hours of unprotected intercourse.' },
      { q:'A patient taking insulin glargine asks what to do after missing the usual evening dose by several hours. What is the BEST advice?', opts:['Double the next scheduled dose.','Take two doses together.','Follow the prescribed missed-dose instructions or contact the healthcare provider/pharmacist for individualized guidance; do not double the dose.','Stop insulin permanently.'], ans:2, exp:'Management of a missed basal insulin dose depends on the specific insulin, timing, and patient factors. Doubling the next dose increases the risk of hypoglycemia.' },
      { q:'A patient taking hydrochlorothiazide develops persistent muscle cramps. Laboratory results show: Sodium = 139 mEq/L, Potassium = 3.0 mEq/L. Which medication is most likely responsible?', opts:['Hydrochlorothiazide','Atorvastatin','Aspirin','Omeprazole'], ans:0, exp:'Thiazide diuretics increase urinary potassium excretion, leading to hypokalemia, which can present with muscle cramps and weakness.' },
      { q:'A patient being treated for tuberculosis complains of numbness and tingling in both feet after starting therapy. Which medication is most likely responsible?', opts:['Rifampicin','Isoniazid','Ethambutol','Pyrazinamide'], ans:1, exp:'Isoniazid may cause peripheral neuropathy by depleting pyridoxine (vitamin B6). Pyridoxine supplementation is recommended for patients at increased risk.' },
      { q:'A patient taking rivaroxaban asks if routine INR testing is needed. What is the correct response?', opts:['INR testing is required every week.','INR testing is generally not required with rivaroxaban.','INR should be checked after every dose.','INR monitoring is mandatory before meals.'], ans:1, exp:'Direct oral anticoagulants such as rivaroxaban do not require routine INR monitoring, unlike warfarin.' },
      { q:'A father wants to alternate paracetamol and ibuprofen every two hours for his child\'s fever because "it works faster." What is the BEST response?', opts:['Recommend alternating every two hours.','Advise against this practice because it increases the risk of dosing errors; use one medication at the appropriate dose and interval unless specifically instructed by a clinician.','Give both medicines together every four hours.','Stop all fever medications.'], ans:1, exp:'Frequent alternating schedules increase the risk of accidental overdose. Parents should follow appropriate weight-based dosing and dosing intervals.' },
      { q:'A patient taking warfarin begins self-medicating with high-dose ibuprofen for back pain. Which complication is most likely?', opts:['Reduced anticoagulant effect','Increased risk of gastrointestinal bleeding','Hyperglycemia','Bradycardia'], ans:1, exp:'Ibuprofen increases gastrointestinal bleeding risk through platelet inhibition and gastric mucosal injury. Combined with warfarin, the bleeding risk is significantly increased.' },
      { q:'A patient with COPD continues to smoke one pack per day despite counseling. Which intervention has the strongest evidence for improving long-term smoking cessation rates?', opts:['Antibiotics','Varenicline combined with behavioral counseling','Vitamin C supplementation','Short-term corticosteroids'], ans:1, exp:'Combining pharmacotherapy with structured behavioral support produces higher smoking cessation success rates than either approach alone.' }
    ]
  },
  { name: 'Test 4', icon: 'fa-file-lines', color: '#14b8a6', questions: [
      { q:'A 64-year-old man with methicillin-resistant Staphylococcus aureus (MRSA) bacteremia is receiving intravenous vancomycin. After 4 days of therapy, his serum creatinine has increased from 0.9 mg/dL to 1.8 mg/dL. What is the pharmacist\'s BEST recommendation?', opts:['Continue the same dose because the infection is improving.','Stop vancomycin immediately without consulting the physician.','Recommend reassessment of vancomycin dosing with therapeutic drug monitoring and evaluation of renal function.','Add gentamicin to improve efficacy.'], ans:2, exp:'Vancomycin is nephrotoxic. Rising serum creatinine should prompt assessment of renal function, review of drug levels (e.g., AUC-guided monitoring where available), and dose adjustment if indicated.' },
      { q:'A 58-year-old patient has been receiving unfractionated heparin for 7 days following surgery. His platelet count has fallen from 260,000/µL to 90,000/µL, and he develops a painful swollen leg. What is the MOST likely diagnosis?', opts:['Disseminated intravascular coagulation','Heparin-induced thrombocytopenia','Immune thrombocytopenic purpura','Vitamin K deficiency'], ans:1, exp:'A platelet fall of >50% occurring 5–10 days after starting heparin, especially with new thrombosis, strongly suggests HIT. Heparin should be discontinued and an alternative anticoagulant initiated.' },
      { q:'A 45-year-old woman stabilized on lithium for bipolar disorder develops nausea, coarse tremor, and confusion after starting hydrochlorothiazide. Which mechanism explains this interaction?', opts:['Increased hepatic metabolism of lithium','Reduced renal clearance of lithium','Increased gastrointestinal absorption of lithium','Protein-binding displacement'], ans:1, exp:'Thiazide diuretics decrease renal lithium clearance, increasing serum lithium concentrations and the risk of toxicity.' },
      { q:'During intravenous administration of doxorubicin, a patient complains of burning pain and swelling around the IV site. What is the pharmacist\'s BEST recommendation?', opts:['Increase the infusion rate.','Continue the infusion because this is expected.','Stop the infusion immediately and manage as suspected extravasation.','Flush the IV rapidly with saline while continuing the infusion.'], ans:2, exp:'Doxorubicin is a vesicant. Extravasation can cause severe tissue necrosis and requires immediate intervention.' },
      { q:'A patient with newly diagnosed hyperthyroidism is started on methimazole. Which counseling point is MOST important?', opts:['Mild fever can be ignored.','Report fever or sore throat immediately.','Avoid dairy products.','Take only with grapefruit juice.'], ans:1, exp:'Methimazole may rarely cause agranulocytosis. Fever or sore throat should prompt immediate medical evaluation and a complete blood count.' },
      { q:'A patient taking levodopa/carbidopa reports that the medication "wears off" before the next scheduled dose. What does this phenomenon represent?', opts:['Serotonin syndrome','Wearing-off effect','Neuroleptic malignant syndrome','Akathisia'], ans:1, exp:'Wearing-off is a common motor fluctuation in Parkinson disease where the benefit of each dose shortens as the disease progresses.' },
      { q:'A patient presents with acute gout affecting the first metatarsophalangeal joint. He asks whether he should start allopurinol today because he has the tablets at home. What is the BEST advice?', opts:['Start allopurinol immediately without medical review.','Delay initiation of urate-lowering therapy until the acute flare has been appropriately managed unless already established on therapy.','Double the allopurinol dose.','Replace allopurinol with amoxicillin.'], ans:1, exp:'During an acute gout flare, the priority is treating inflammation (e.g., NSAID, colchicine, or corticosteroid). Urate-lowering therapy is typically initiated after the flare has settled if not already being taken.' },
      { q:'A farmer presents with excessive salivation, sweating, pinpoint pupils, wheezing, and muscle fasciculations after pesticide exposure. Which antidote should be administered first?', opts:['Naloxone','Atropine','Flumazenil','Protamine'], ans:1, exp:'Organophosphate poisoning causes cholinergic toxicity. Atropine reverses muscarinic effects, while pralidoxime is added when indicated.' },
      { q:'A patient has been taking prednisolone 20 mg daily for six months. Which preventive measure is MOST appropriate?', opts:['Routine iron supplementation only','Bone protection with calcium/vitamin D and assessment of osteoporosis risk','Daily antibiotics','Restrict all dietary protein'], ans:1, exp:'Long-term corticosteroids increase the risk of osteoporosis. Calcium, vitamin D, and consideration of antiresorptive therapy are recommended based on fracture risk.' },
      { q:'A patient previously experienced an immediate hypersensitivity reaction to iodinated contrast media and is scheduled for another contrast-enhanced CT scan. What is the pharmacist\'s BEST action?', opts:['Ignore the previous reaction.','Inform the radiology team so appropriate risk assessment, alternative imaging, or premedication strategies can be considered.','Recommend doubling the contrast dose.','Give aspirin before the scan.'], ans:1, exp:'A history of contrast allergy requires careful planning. Depending on the situation, alternative imaging or premedication may be appropriate.' },
      { q:'A patient taking sertraline starts linezolid and soon develops agitation, hyperreflexia, tremor, fever, and diaphoresis. What is the MOST likely diagnosis?', opts:['Neuroleptic malignant syndrome','Serotonin syndrome','Malignant hyperthermia','Heat exhaustion'], ans:1, exp:'Linezolid has monoamine oxidase inhibitor activity and can precipitate serotonin syndrome when combined with serotonergic medications.' },
      { q:'A patient with benign prostatic hyperplasia is prescribed tamsulosin. Which counseling point is MOST appropriate?', opts:['Take it only when symptoms occur.','Rise slowly from sitting or lying positions to reduce dizziness.','Avoid drinking water.','Stop the medication after one week.'], ans:1, exp:'Tamsulosin can cause orthostatic hypotension, especially when treatment is initiated.' },
      { q:'A patient presents with severe epigastric pain radiating to the back. Laboratory tests reveal markedly elevated serum lipase. Which medication is a recognized cause of drug-induced pancreatitis?', opts:['Azathioprine','Loratadine','Calcium carbonate','Salbutamol'], ans:0, exp:'Azathioprine is a well-recognized cause of drug-induced pancreatitis.' },
      { q:'A patient with myasthenia gravis is prescribed gentamicin for a urinary tract infection. What should the pharmacist do?', opts:['Dispense the medication.','Contact the prescriber because aminoglycosides may worsen neuromuscular weakness.','Recommend doubling the dose.','Advise taking it with milk.'], ans:1, exp:'Aminoglycosides can impair neuromuscular transmission and may precipitate severe weakness in patients with myasthenia gravis.' },
      { q:'A patient presents with constipation, confusion, polyuria, and a serum calcium level of 13.8 mg/dL. Which medication could contribute to this condition?', opts:['Hydrochlorothiazide','Furosemide','Insulin','Metformin'], ans:0, exp:'Thiazide diuretics reduce urinary calcium excretion and may worsen hypercalcemia.' },
      { q:'A patient traveling to a malaria-endemic region asks when to begin atovaquone/proguanil prophylaxis.', opts:['On the day of return','One to two days before travel','One month after arrival','Only if fever develops'], ans:1, exp:'Atovaquone/proguanil is started 1–2 days before entering a malaria-endemic area, continued during travel, and for 7 days after leaving.' },
      { q:'A patient receiving long-term morphine develops persistent constipation despite adequate hydration. What is the BEST recommendation?', opts:['Stop drinking fluids.','Initiate a stimulant laxative such as senna (often with or without a stool softener).','Increase opioid dose.','Start loperamide.'], ans:1, exp:'Prophylactic bowel regimens, commonly with stimulant laxatives, are recommended for patients receiving chronic opioid therapy.' },
      { q:'A prescription reads: Insulin 10 U SC. What is the pharmacist\'s BEST action?', opts:['Dispense as written.','Clarify the prescription because the abbreviation "U" can be misread and is considered unsafe.','Double the insulin dose.','Replace insulin with metformin.'], ans:1, exp:'The abbreviation "U" for units is considered unsafe because it may be misinterpreted as "0" or "4." Prescriptions should clearly state "units."' },
      { q:'A patient taking antiretroviral therapy asks why adherence is emphasized. What is the BEST explanation?', opts:['Missing doses has no effect.','Poor adherence increases the risk of virologic failure and drug resistance.','Antiretroviral therapy can be stopped once symptoms improve.','Treatment is required only during illness.'], ans:1, exp:'High adherence is essential to maintain viral suppression and prevent the emergence of resistant virus.' },
      { q:'A patient taking methotrexate asks why folic acid has been prescribed.', opts:['To improve absorption of methotrexate.','To reduce adverse effects such as oral ulcers and gastrointestinal toxicity.','To increase methotrexate toxicity.','To treat anemia caused by iron deficiency.'], ans:1, exp:'Folic acid supplementation reduces several methotrexate-associated adverse effects without significantly reducing efficacy when used appropriately.' },
      { q:'A 67-year-old patient with hypokalemia (K⁺ = 2.8 mEq/L) is prescribed 40 mEq potassium chloride IV bolus. Before dispensing, the pharmacist reviews the order. What is the BEST intervention?', opts:['Dispense immediately because potassium should be replaced rapidly.','Recommend changing to an IV infusion using the appropriate dilution and infusion rate.','Substitute potassium citrate.','Advise oral potassium only.'], ans:1, exp:'Intravenous potassium chloride should never be given as an IV bolus because it can cause fatal cardiac arrhythmias. It must be diluted and infused at a controlled rate.' },
      { q:'A 73-year-old woman develops severe diarrhea after completing a course of antibiotics. Stool testing confirms Clostridioides difficile infection. Which medication should generally be avoided unless there is another clear indication?', opts:['Oral vancomycin','Fidaxomicin','Loperamide','Oral rehydration solution'], ans:2, exp:'Antimotility agents such as loperamide are generally avoided in active C. difficile infection because they may delay toxin clearance and worsen disease.' },
      { q:'A 62-year-old woman is taking sotalol for atrial fibrillation. She is prescribed another medication that also prolongs the QT interval. Which electrolyte abnormality would further increase her risk of torsades de pointes?', opts:['Hypernatremia','Hypomagnesemia','Hyperphosphatemia','Hyperchloremia'], ans:1, exp:'Both hypokalemia and hypomagnesemia increase the risk of torsades de pointes in patients receiving QT-prolonging drugs.' },
      { q:'A kidney transplant recipient taking tacrolimus asks whether it is safe to drink grapefruit juice daily. What is the BEST advice?', opts:['Grapefruit juice improves tacrolimus effectiveness.','Avoid grapefruit juice because it can significantly increase tacrolimus concentrations.','Drink grapefruit juice only at night.','Grapefruit juice reduces tacrolimus toxicity.'], ans:1, exp:'Grapefruit inhibits intestinal CYP3A4, increasing tacrolimus levels and the risk of nephrotoxicity and neurotoxicity.' },
      { q:'A woman with epilepsy taking valproate informs the pharmacist that she is planning pregnancy. What is the BEST recommendation?', opts:['Continue valproate without review.','Discuss pregnancy planning promptly with her neurologist because valproate has a high risk of fetal malformations and neurodevelopmental disorders.','Stop valproate immediately without medical advice.','Reduce the dose by half on her own.'], ans:1, exp:'Valproate carries a high teratogenic risk. Women of childbearing potential should receive specialist counseling before conception.' }
    ]
  },
  { name: 'Test 5', icon: 'fa-file-lines', color: '#f59e0b', questions: [
      { q:'A patient receiving total parenteral nutrition suddenly develops fever and chills during infusion through a central venous catheter. What should the healthcare team suspect first?', opts:['Vitamin deficiency','Catheter-related bloodstream infection','Hypercalcemia','Iron deficiency'], ans:1, exp:'Fever and chills during central line infusion raise concern for catheter-related bloodstream infection.' },
      { q:'A patient on dabigatran presents with life-threatening gastrointestinal bleeding. Which reversal agent is specific for dabigatran?', opts:['Protamine sulfate','Idarucizumab','Vitamin K','Tranexamic acid'], ans:1, exp:'Idarucizumab is a monoclonal antibody fragment that specifically reverses the anticoagulant effect of dabigatran.' },
      { q:'Which medication is most likely responsible for worsening glycemic control in a patient with diabetes?', opts:['Prednisone','Amoxicillin','Loratadine','Omeprazole'], ans:0, exp:'Corticosteroids increase hepatic glucose production and reduce insulin sensitivity, often causing hyperglycemia.' },
      { q:'A patient receiving piperacillin/tazobactam develops widespread urticaria, wheezing, and hypotension within minutes of starting the infusion. What is the pharmacist\'s FIRST recommendation?', opts:['Slow the infusion.','Stop the infusion immediately and initiate emergency management for anaphylaxis.','Continue while monitoring.','Administer paracetamol.'], ans:1, exp:'This presentation is consistent with anaphylaxis. Immediate discontinuation of the offending drug and emergency treatment are required.' },
      { q:'A patient taking levothyroxine begins calcium carbonate for osteoporosis. How should these medications be taken?', opts:['Together after breakfast.','Separate administration by at least 4 hours.','Crush and mix together.','No spacing is required.'], ans:1, exp:'Calcium significantly reduces levothyroxine absorption and should be taken several hours apart.' },
      { q:'A patient with cirrhosis develops increasing confusion, drowsiness, and asterixis. Which medication is commonly used to reduce ammonia levels?', opts:['Omeprazole','Lactulose','Metoclopramide','Domperidone'], ans:1, exp:'Lactulose decreases ammonia absorption by acidifying the colon and promoting its excretion.' },
      { q:'A healthcare worker experiences a needlestick injury from a patient with known HIV infection. What is the pharmacist\'s BEST advice?', opts:['Observe only.','Begin HIV post-exposure prophylaxis (PEP) as soon as possible after appropriate risk assessment.','Wait for symptoms.','Take amoxicillin.'], ans:1, exp:'HIV PEP should be started as soon as possible, ideally within hours, following significant occupational exposure.' },
      { q:'A patient receiving chronic loop diuretic therapy develops muscle weakness and cardiac arrhythmias. Magnesium is 0.9 mg/dL (low). Which electrolyte deficiency is present?', opts:['Hypermagnesemia','Hypomagnesemia','Hypercalcemia','Hypernatremia'], ans:1, exp:'Loop diuretics can increase magnesium excretion, leading to hypomagnesemia.' },
      { q:'A patient receiving cisplatin complains of ringing in the ears. Which adverse effect should be suspected?', opts:['Ototoxicity','Hepatotoxicity','Pancreatitis','Bradycardia'], ans:0, exp:'Cisplatin is associated with dose-related ototoxicity, nephrotoxicity, and peripheral neuropathy.' },
      { q:'A prescription states: Morphine 2.0 mg IV. The decimal point is faint and could easily be misread. What is the pharmacist\'s BEST action?', opts:['Dispense immediately.','Clarify the prescription before dispensing because unsafe decimal notation may lead to medication errors.','Assume 20 mg.','Assume 2 mg without verification.'], ans:1, exp:'Unsafe decimal notation is a recognized cause of medication errors. Ambiguous prescriptions must be clarified.' },
      { q:'A patient has a urine culture showing asymptomatic bacteriuria before elective orthopedic surgery (not involving the urinary tract). What is the pharmacist\'s recommendation?', opts:['Treat all asymptomatic bacteriuria.','Antibiotic treatment is generally not recommended unless there is a specific indication (e.g., pregnancy or certain urologic procedures).','Give ciprofloxacin for 14 days.','Start two antibiotics.'], ans:1, exp:'Routine treatment of asymptomatic bacteriuria is generally unnecessary except in selected situations.' },
      { q:'A patient taking chronic glucocorticoids develops moon facies, truncal obesity, and purple striae. What syndrome is most likely?', opts:['Addison disease','Cushing syndrome','Conn syndrome','Graves disease'], ans:1, exp:'These are classic features of glucocorticoid excess (Cushing syndrome).' },
      { q:'A child accidentally ingests a bottle of household bleach. What is the MOST appropriate immediate advice?', opts:['Induce vomiting.','Encourage small amounts of water or milk if appropriate and contact the poison center/emergency services; do not induce vomiting.','Give activated charcoal.','Give lemon juice.'], ans:1, exp:'Corrosive ingestions should not be managed by inducing vomiting because this can worsen esophageal injury.' },
      { q:'A patient taking isotretinoin complains of severe dry lips and dry skin. Which counseling point is MOST appropriate?', opts:['Stop drinking water.','Use lip balm and moisturizers regularly and avoid blood donation during treatment.','Increase sun exposure.','Discontinue immediately without consulting the prescriber.'], ans:1, exp:'Mucocutaneous dryness is common with isotretinoin. Patients should also avoid blood donation due to teratogenic risk.' },
      { q:'A patient taking hydroxychloroquine for systemic lupus erythematosus asks why periodic eye examinations are necessary.', opts:['To monitor cataracts only.','To detect retinal toxicity.','To measure intraocular pressure only.','Because the drug causes glaucoma in all patients.'], ans:1, exp:'Long-term hydroxychloroquine use can cause retinal toxicity; regular ophthalmologic screening is recommended.' },
      { q:'A patient with cystic fibrosis is prescribed inhaled dornase alfa. What is its primary therapeutic action?', opts:['Bronchodilation','Reduces mucus viscosity by breaking down extracellular DNA.','Suppresses cough.','Treats bacterial infection.'], ans:1, exp:'Dornase alfa cleaves extracellular DNA in airway secretions, reducing mucus viscosity.' },
      { q:'A patient with migraine experiences chest tightness after taking sumatriptan. What is the pharmacist\'s concern?', opts:['This always indicates myocardial infarction.','Triptans cause vasoconstriction and should be used cautiously in patients with cardiovascular disease.','It is due to hypoglycemia.','It is caused by dehydration only.'], ans:1, exp:'Triptans can cause coronary vasoconstriction and are contraindicated in certain cardiovascular conditions.' },
      { q:'A patient receiving amphotericin B requires close monitoring of which organ function?', opts:['Thyroid function','Renal function','Pulmonary function','Pancreatic function'], ans:1, exp:'Amphotericin B is associated with significant nephrotoxicity and electrolyte disturbances.' },
      { q:'A breastfeeding mother asks whether pseudoephedrine is the best option for nasal congestion. What is the BEST advice?', opts:['It is preferred because it increases milk production.','It may reduce milk supply and should be used cautiously; discuss appropriate alternatives.','Double the dose.','Stop breastfeeding permanently.'], ans:1, exp:'Pseudoephedrine may decrease milk production and should be used with caution during lactation.' },
      { q:'A 24-year-old woman with type 1 diabetes presents with vomiting, abdominal pain, and deep, rapid breathing. Laboratory findings include: Blood glucose: 520 mg/dL, pH: 7.12, Serum potassium: 5.6 mEq/L, Positive serum ketones. Which treatment should be started first?', opts:['IV sodium bicarbonate','IV normal saline','IV insulin immediately without fluids','Potassium chloride infusion'], ans:1, exp:'The first priority in DKA is aggressive fluid resuscitation. Insulin is started after initial fluid replacement and after confirming potassium is adequate.' },
      { q:'An 80-year-old man with type 2 diabetes presents with confusion. Laboratory values: Blood glucose: 980 mg/dL, Serum osmolality: 345 mOsm/kg, No ketones, pH: 7.37. Which diagnosis is most likely?', opts:['DKA','HHS','Lactic acidosis','Hypoglycemia'], ans:1, exp:'HHS is characterized by profound hyperglycemia, hyperosmolality, dehydration, and minimal or absent ketosis.' },
      { q:'A patient with small-cell lung cancer has: Sodium: 118 mEq/L, Serum osmolality: Low, Urine osmolality: High. Which diagnosis is most likely?', opts:['Diabetes insipidus','SIADH','Addison disease','Hyperaldosteronism'], ans:1, exp:'SIADH causes dilutional hyponatremia with concentrated urine despite low serum osmolality.' },
      { q:'A 63-year-old woman develops sudden severe eye pain, headache, nausea, blurred vision, and halos around lights. What should the pharmacist recommend?', opts:['Artificial tears','Urgent emergency referral','Chloramphenicol eye drops','Continue observation'], ans:1, exp:'Acute angle-closure glaucoma is an ophthalmic emergency that can rapidly cause permanent vision loss.' },
      { q:'A patient taking clozapine develops fever and sore throat. Which laboratory test is most important?', opts:['Liver enzymes','Absolute neutrophil count (ANC)','Serum sodium','INR'], ans:1, exp:'Clozapine can cause agranulocytosis. Fever or sore throat requires immediate ANC evaluation.' },
      { q:'A patient started haloperidol three days ago develops: High fever, Generalized rigidity, Confusion, Elevated CK. What is the most likely diagnosis?', opts:['Serotonin syndrome','Neuroleptic malignant syndrome','Heat stroke','Meningitis'], ans:1, exp:'NMS is a life-threatening reaction to dopamine antagonists characterized by hyperthermia, rigidity, altered mental status, and elevated creatine kinase.' }
    ]
  }
]
