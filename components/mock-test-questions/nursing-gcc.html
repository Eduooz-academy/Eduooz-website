<!-- Nursing GCC Prometric/Pearson VUE Mock Test Question Bank -->
<!-- Flat structure: 5 Tests, ~25 questions each, no category/topic nesting -->
<script type="application/x-exam-questions">
[
  {
    name: 'Test 1', icon: 'fa-file-lines', color: '#06b6d4',
    questions: [
      { q:'A 15-year-old girl is admitted after a Motor Vehicle Accident. The child has a fracture in her left leg and a wound on her face. When dealing with this child, the nurse should be aware that an important task to achieve during this age is which of the following?', opts:['Initiative versus guilt','Industry versus inferiority','Trust versus mistrust','Identity vs. Role confusion'], ans:3, exp:'Adolescents (12–18 years) are working through Erikson\'s psychosocial stage of identity versus role confusion, so the nurse should be sensitive to concerns about self-image and peer identity in this age group, especially given her facial injury.' },
      { q:'Mastitis is an infection of the breast that occurs most often 2–4 weeks after childbirth. Which of the following is considered first-line treatment of mastitis?', opts:['Drainage of breast abscess','Antibiotic therapy and cessation of breastfeeding','Antibiotic therapy and continuation of breastfeeding','Advise mother to stop breastfeeding until infection is clean'], ans:2, exp:'Mastitis is treated with antibiotics while breastfeeding continues, since continued milk removal prevents stasis and helps resolve the infection faster; stopping breastfeeding increases the risk of abscess formation.' },
      { q:'Postpartum mother was complaining of mastitis on the right breast, and she told the nurse that it\'s safe feeding by the left side. What should the nurse respond?', opts:['Breastfeed from both sides; it is safe','The left side is only safe','The right side is only safe'], ans:0, exp:'Breastfeeding from both breasts, including the infected one, is safe and recommended because it promotes milk drainage and does not harm the infant; the infection is confined to breast tissue, not the milk itself.' },
      { q:'A nurse is providing instructions to a mother diagnosed with mastitis. Which of the following statements, if made by the mother, indicates the need for further teaching?', opts:['I need to take antibiotics and I should begin to feel better in 24–48 hours.','I can use analgesics to assist in alleviating some of the discomfort.','I need to wear a supportive bra to relieve the discomfort.','I need to stop breastfeeding until this condition resolves.'], ans:3, exp:'Stopping breastfeeding during mastitis is incorrect; continued breastfeeding or pumping is encouraged to prevent milk stasis and promote resolution of the infection.' },
      { q:'A nurse is giving health education for a mother who has mastitis. Which of the following, if stated by the mother, indicates additional education is needed?', opts:['Take antibiotics','Use analgesics','Wear a supportive bra','Stop breastfeeding'], ans:3, exp:'As with standard mastitis management, breastfeeding should continue rather than stop, so a statement about stopping breastfeeding shows a need for further teaching.' },
      { q:'Extrapyramidal adverse effects and symptoms are most often associated with which of the following drug classes?', opts:['Antidepressants','Antipsychotics','Antihypertensives','Antidysrhythmics'], ans:1, exp:'Antipsychotic medications block dopamine receptors in the nigrostriatal pathway, which produces extrapyramidal symptoms such as dystonia, akathisia, and tardive dyskinesia.' },
      { q:'A psychiatric patient is complaining of extrapyramidal side effects with continuous spasms and muscle contractions, motor restlessness, rigidity, slowness of movement, tremor, and irregular jerky movements, upward eye movement, smacking and sucking of lips, and protruding tongue. What is the most common drug that causes this?', opts:['Clozapine','Haloperidol'], ans:1, exp:'Haloperidol is a high-potency typical antipsychotic with strong dopamine D2 blockade, making it much more likely than atypical agents like clozapine to cause extrapyramidal symptoms and tardive dyskinesia.' },
      { q:'A 19-year-old boy has been hospitalized with fractures in upper and lower extremities after an accident and has been provided with casts for both limbs. Which of these nursing diagnoses should the nurse consider in the nursing plan of care according to his age?', opts:['Impaired social interaction','Alteration in body image','Risk for infection','Anxiety'], ans:1, exp:'Adolescents and young adults are highly focused on physical appearance and peer acceptance, so sudden immobilization and visible casts commonly threaten body image, making this the priority developmental nursing diagnosis.' },
      { q:'Nurse plans a community program for those who experienced a disease and assesses the recovery, rehabilitation, or disability. Which level of prevention is this?', opts:['Primary','Secondary','Tertiary'], ans:2, exp:'Tertiary prevention focuses on rehabilitation and minimizing disability after a disease has already occurred, which matches recovery and rehabilitation programs.' },
      { q:'What is an example of secondary level of prevention?', opts:['How to stop smoking','Given education on HIV to high school students','Ensuring compliance with medication'], ans:2, exp:'Secondary prevention involves early detection and prompt treatment of existing disease, such as promoting medication compliance to control an already-diagnosed condition, whereas the other options are primary prevention or health promotion activities.' },
      { q:'A gravida 3 para 2 presents to the Maternity Triage Unit after the amniotic membranes ruptured at home. The fluid is clear. The neonate’s head is engaged into the pelvis and the patient is having contractions every 5–7 minutes. Each contraction lasts 60–90 seconds. Examination shows 4 cm dilation and 90% effacement. She rates her pain as 7/10. Which of the following is most indicative that she is in true labour?', opts:['Level of pain','Cervical dilatation and effacement','Engagement of presenting part','Frequency and length of contractions'], ans:1, exp:'Progressive cervical dilatation and effacement is the definitive sign of true labor, distinguishing it from false labor, which does not produce cervical change despite contractions and pain.' },
      { q:'A new-born has small, whitish, pinpoint spots over the nose, which the nurse knows are caused by retained sebaceous secretions. When charting this observation, the nurse identifies it as:', opts:['Milia','Lanugo','Whiteheads','Mongolian spots'], ans:0, exp:'Milia are tiny white papules caused by retained sebaceous secretions in newborn sebaceous glands, commonly seen across the nose and cheeks, and resolve spontaneously within a few weeks.' },
      { q:'Radon can cause any cancer:', opts:['Skin','Cervical','Colon','Prostatic'], ans:0, exp:'Radon gas decay products emit ionizing alpha radiation; besides being the second leading cause of lung cancer after smoking, chronic radon exposure has also been associated with pancreatic cancer, in addition to the skin-related risk identified here.' },
      { q:'What is the action of combined oral contraceptives?', opts:['Induce thinning of endometrium and prevent ovulation','Decrease the production of luteinizing hormone and follicle growth and prevent ovulation.'], ans:0, exp:'Combined oral contraceptives primarily suppress ovulation through negative feedback on the hypothalamic-pituitary axis and also thin the endometrial lining, making it less receptive to implantation.' },
      { q:'A nurse cares for a client with an epidural catheter for labor pain management and requests additional medication. A student registered nurse anesthetist (SRNA) administers medication via the epidural catheter. Which action performed by the SRNA requires the nurse to stop medication administration?', opts:['Aspirating bloody fluid into a syringe','Obtaining a negative aspiration into a syringe','Cleansing the port with alcohol for 15 seconds','Assessing the client’s blood pressure'], ans:2, exp:'Alcohol-based antiseptics must never be used on an epidural port because inadvertent introduction of alcohol into the epidural or intrathecal space is neurotoxic and can cause arachnoiditis or permanent neurologic injury, so the nurse must stop the SRNA immediately.' },
      { q:'Patient ABG: pH 7.38, PCO₂ 50, HCO₃ = normal. What is the ABG interpretation?', opts:['Compensated metabolic alkalosis','Uncompensated metabolic acidosis','Compensated respiratory acidosis','Uncompensated respiratory alkalosis'], ans:2, exp:'A near-normal pH with an elevated PCO₂ indicates the kidneys have compensated for a primary respiratory acidosis by retaining bicarbonate to normalize pH.' },
      { q:'ABG reading: low pH, high PCO₂, normal HCO₃. What is the interpretation?', opts:['Compensated respiratory acidosis','Uncompensated respiratory acidosis','Metabolic acidosis','Metabolic alkalosis'], ans:1, exp:'A low pH with an elevated PCO₂ and a normal (not yet elevated) HCO₃ indicates uncompensated respiratory acidosis, since the kidneys have not yet had time to retain bicarbonate to buffer the pH.' },
      { q:'Gastric suction can cause:', opts:['Metabolic acidosis','Respiratory acidosis','Metabolic alkalosis','Respiratory alkalosis'], ans:2, exp:'Continuous gastric suction removes hydrochloric acid and hydrogen ions from the stomach, leading to a loss of acid and a resulting metabolic alkalosis.' },
      { q:'Patient with ABG: low pH, high PCO₂, normal HCO₃. What symptoms are expected?', opts:['Vomiting and difficult breathing (SOB)','Headache and vomiting','Shallow, rapid breathing and vomiting','Kussmaul respirations'], ans:0, exp:'Uncompensated respiratory acidosis results from hypoventilation and CO₂ retention, producing dyspnea and shortness of breath, and the associated hypoxia commonly triggers nausea and vomiting.' },
      { q:'A 5-week-old newborn was admitted with pyloric stenosis, weight loss, and projectile vomiting during feeding. They scheduled surgical repair. Which postoperative intervention is most appropriate?', opts:['IV fluid until infant is retaining adequate amount by mouth','Administration of proper analgesia until discomfort resolves','Start feeding immediately after postoperative','Vomiting is uncommon in the first 24–48 hrs'], ans:0, exp:'After pyloromyotomy, oral feedings are reintroduced gradually and slowly, so IV fluids are maintained until the infant demonstrates adequate oral intake without vomiting, preventing dehydration during the transition.' },
      { q:'An infant was admitted with patent ductus arteriosus. Indomethacin 0.2 mg/kg, a prostaglandin inhibitor via IV route, was prescribed. What is the function of indomethacin?', opts:['Assist closure of ductus arteriosus','Prevent infection','Improve tissue perfusion','Preserve hormone level'], ans:0, exp:'Indomethacin is a prostaglandin synthetase inhibitor that reduces circulating prostaglandin E, the substance that keeps the ductus arteriosus open, thereby promoting its closure in infants with PDA.' },
      { q:'A 30-year-old pregnant woman at 33 weeks. When assessing her health condition, the nurse provides care and health teaching. Which type of home visit is best to conduct?', opts:['Follow-up','Selective','Systematic routine'], ans:2, exp:'A scheduled prenatal assessment and health teaching visit that is part of a planned antenatal care schedule, rather than triggered by a specific referral or problem, is classified as a systematic routine home visit.' },
      { q:'An 8-month-old infant is admitted with Hirschsprung disease. Which finding is significant?', opts:['Depressed anterior fontanel','Polyuria, hematuria','Weight gain, edema','Failure to thrive, constipation'], ans:3, exp:'Hirschsprung disease results from absent ganglion cells in a segment of colon, causing functional obstruction that presents with chronic constipation, abdominal distention, and failure to thrive.' },
      { q:'A 56-year-old man with COPD complains of chest pain, shortness of breath, lethargy, fever, and productive cough. Crackles heard in lower lobes. BP 110/70, HR 111, RR 18, Temp 37.4°C, O2 sat 90%. Best position?', opts:['Prone','Supine','High Fowler','Trendelenburg'], ans:2, exp:'High Fowler’s position maximizes diaphragmatic excursion and lung expansion, easing the work of breathing in a patient with a COPD exacerbation and hypoxia.' },
      { q:'A nurse is assessing a 2-year-old child brought to the pediatric clinic by a parent. The parent reports that the child has been irritable, has had a fever, and has not been sleeping well. Which additional finding would most strongly support a diagnosis of acute otitis media?', opts:['Purulent drainage from the ear canal (otorrhea)','Rolling the head from side to side','Clear nasal drainage','Increased appetite'], ans:0, exp:'Purulent otorrhea indicates tympanic membrane rupture from the pressure of a middle ear infection and is the most specific finding confirming acute otitis media among the choices given.' }
    ]
  },
  { name: 'Test 2', icon: 'fa-file-lines', color: '#3b82f6', questions: [
      { q:'Patient diagnosed with UTI, frequent urination. Urine analysis rescheduled to next day. Best action?', opts:['Increase fluid intake','Decrease fluid intake','Normal fluid intake','Avoid fluids'], ans:2, exp:'Maintaining normal, usual fluid intake before a urinalysis or culture avoids diluting the specimen, which could mask bacteriuria, while still avoiding dehydration-related concentration artifacts.' },
      { q:'What advice should be given to a patient with a urinary tract infection?', opts:['Drink 2–3 liters of water','Wipe from back to front','Urinate only when you feel the urge','Ultrasound'], ans:0, exp:'Increasing fluid intake to 2–3 liters daily is standard teaching for UTI patients, as it promotes frequent voiding that mechanically flushes bacteria from the urinary tract.' },
      { q:'A young boy with polyuria and dysuria diagnosed with UTI. What to do to take urine sample?', opts:['Increase fluid intake','Decrease urine intake','Regular fluid','Zero fluid'], ans:2, exp:'For an accurate urine culture, the child should maintain his regular fluid intake; overhydrating dilutes the bacterial count and can produce a false-negative culture, while restricting fluids overly concentrates the sample.' },
      { q:'A nurse is providing discharge teaching to a postpartum mother 2 days after delivery. The newborn had a heel-stick blood sample collected for phenylketonuria (PKU) screening and is scheduled for circumcision the following day. Which instruction is most important for the nurse to include regarding care after circumcision?', opts:['Avoid applying the diaper too tightly.','Notify the healthcare provider if the newborn does not urinate within 24 hours after circumcision.','Clean the circumcision site vigorously with soap and water.','Remove any yellow crust that develops on the circumcision site.'], ans:1, exp:'Failure to void within 24 hours after circumcision may indicate urinary retention or obstruction from swelling and requires prompt provider notification, making this the most important safety instruction.' },
      { q:'Patient fell; left leg externally rotated and shorter than right. Severe pain, unable to move leg. Most likely cause?', opts:['Dislocated patella','Fractured left hip','Fractured left tibia','Dislocated left fibula'], ans:1, exp:'External rotation and shortening of the affected leg with severe pain and inability to move it are the classic clinical signs of a hip fracture.' },
      { q:'Patient admitted after abdominal injuries and femur fracture. Pale, diaphoretic, incoherent. Vitals: Temp 98°F (36.3°C), HR 130, RR 34, BP 50/40. Type of shock?', opts:['Distributive','Neurogenic','Cardiogenic','Hypovolemic'], ans:3, exp:'Trauma with internal abdominal bleeding and a femur fracture causes significant blood loss, producing hypovolemic shock, evidenced by tachycardia, tachypnea, hypotension, and altered mental status.' },
      { q:'A nurse is caring for a postoperative patient with a surgical incision closed with staples. While the nurse is preparing the patient for care, the patient suddenly sneezes, causing one of the staples to become dislodged and fall to the floor. Which action should the nurse take first?', opts:['Pick up the staple from the floor.','Clean the staple and reinsert it into the surgical incision.','Apply a sterile dressing over the affected area of the wound.','Leave the wound uncovered and continue to observe it.'], ans:2, exp:'Once a staple is dislodged, the wound edge is no longer fully approximated and is exposed to contamination, so the priority is to cover it with a sterile dressing to protect it before notifying the surgeon.' },
      { q:'Doctor wrote a new PRN restrain order for a psychiatric patient who is overly aggressive. Which of the following indicates what the nurse should do?', opts:['Call doctor while patient is aggressive to do that by himself','Apply the order one time only or if needed','Close patient room and do not apply restrain','Express that is not acceptable and complain about your supervisor'], ans:1, exp:'A PRN restraint order authorizes the nurse to apply restraints as needed based on clinical judgment for a single episode, rather than as a standing continuous order.' },
      { q:'Therapeutic communication is used by the nurse to create a beneficial outcome in the delivery of quality nursing care. Which of the following best describes “therapeutic communication”?', opts:['Interactive process of socialization','Assessment component of nursing process','Communication with patient through words and language','Process to encourage the expression of feelings and needs'], ans:3, exp:'Therapeutic communication is a purposeful, patient-centered process designed to encourage patients to express their feelings and needs, building trust and supporting the therapeutic relationship.' },
      { q:'Which of the following best describes the role of a case manager?', opts:['Promotes healthy lifestyle','Provides coordination of care to ensure continuity','Possesses highly skilled communication methods','Promotes the comfort of the patient'], ans:1, exp:'The case manager’s core role is coordinating services across providers and settings to ensure continuity and efficient, cost-effective care for the patient.' },
      { q:'A 38-year-old patient is about to have lumbar disc surgery. During preoperative care, the nurse instructs the patient and family on how to perform log rolling to change patient position. Postoperatively, a family member asks why this is needed. What is the nurse’s best response?', opts:['Facility good circulation','Avoid movement','Prevent postoperative bed sore','Makes changing the patient’s position easier'], ans:2, exp:'Log rolling maintains spinal alignment while repositioning and avoids prolonged pressure on any one area, which helps prevent postoperative pressure injuries.' },
      { q:'A newly elected nursing supervisor wants to use disciplinary evaluation for nurses’ behavior. What type of power is she using?', opts:['Reward','Coercive','Legitimate','Formal'], ans:1, exp:'Using discipline or the threat of punishment to influence behavior is the definition of coercive power.' },
      { q:'A nurse educator says to a new nurse: “Our hospital provides the highest level of specialized healthcare in an integrated educational and research setting.” Which aspect of the hospital’s strategic plan does this represent?', opts:['Vision','Policy','Values','Mission'], ans:3, exp:'This statement describes the organization’s core purpose and what it does, which defines its mission statement, as opposed to a vision (future aspiration) or values.' },
      { q:'Diphtheria — which type of isolation?', opts:['Droplet','Airborne','Contact','Protective'], ans:0, exp:'Diphtheria is transmitted via respiratory droplets, so droplet precautions are required in addition to standard precautions.' },
      { q:'A patient with schizophrenia is seen with which of the following signs?', opts:['Word salad','Associative looseness','Echolalia','Neologism'], ans:1, exp:'Associative looseness (loose associations), where thoughts shift from one unrelated topic to another, is a classic thought-process disturbance seen in schizophrenia.' },
      { q:'During a home health visit, the nurse administers an intramuscular medication. How should the nurse dispose of the used needle and syringe?', opts:['Recap the needle and place in waterproof container','Bend the needle before placing in metal trash container','Wrap needle and syringe in paper and place in equipment bag','Place the needle and syringe directly into a puncture-resistant plastic container with a lid'], ans:3, exp:'Used needles must never be recapped or manipulated; they should be placed immediately into a puncture-resistant, labeled sharps container to prevent needlestick injury.' },
      { q:'Doctor writes DNR on a patient with end-stage cancer. The patient tells the nurse he wants to be resuscitated. What is your nursing action?', opts:['Explain to the patient to accept DNR','Ignore the patient feeling','Follow the hospital policy.','Report the doctor to Saudi Commission for Health Specialties'], ans:2, exp:'When a conflict exists between a documented DNR order and a competent patient’s current wishes, the nurse must follow institutional policy, which typically requires clarifying the order with the physician and honoring the patient’s expressed wishes.' },
      { q:'Nurse is caring for a client with a nasogastric tube attached to low suction. The nurse monitors the client knowing he is at risk for which acid–base disorder?', opts:['Metabolic acidosis','Metabolic alkalosis','Respiratory acidosis','Respiratory alkalosis'], ans:1, exp:'Continuous gastric suction removes hydrochloric acid, placing the client at risk for metabolic alkalosis.' },
      { q:'Mother of nine children, three with Down syndrome, low socioeconomic status, no family planning. Referred for counseling. What type of home visit should the community nurse conduct?', opts:['Systematic routine','Selective','Follow up','Emergency visits'], ans:2, exp:'Because this family was specifically referred for counseling after identification of a need, the visit is a follow-up visit responding to that referral rather than a routine scheduled visit.' },
      { q:'Nurse assessing patient after craniotomy. BP: 180/65, ICP: 25. What is CPP?', opts:['72 mmHg','81 mmHg','78 mmHg','83 mmHg'], ans:2, exp:'CPP is calculated as MAP minus ICP; with a MAP of approximately 103 mmHg (65 + one-third of the 115 mmHg pulse pressure) and an ICP of 25 mmHg, CPP equals about 78 mmHg.' },
      { q:'A patient in surgical was transferred to isolation with MRSA (methicillin-resistant staph aureus). Which measure should the nurse take?', opts:['Clean the room three times a day','Discard all soiled dressing into waste bag','Instruct the patient to wash hands regularly','Wear gloves and gown on every entry into the room'], ans:3, exp:'MRSA requires contact precautions, meaning gloves and a gown must be worn every time a healthcare worker enters the room to prevent transmission via direct or indirect contact.' },
      { q:'Radon can cause which cancer?', opts:['Skin','Cervical','Colon','Prostatic'], ans:0, exp:'As with radon’s well-known association with lung cancer (and links to pancreatic cancer), this answer key identifies skin cancer risk among the listed options.' },
      { q:'Patient to be discharged after appendectomy. What is the most important desired outcome?', opts:['Remain free of post-surgical complications.','Report fever, redness, or drainage','Use pain management techniques appropriately','Resume activities and avoid weight'], ans:0, exp:'The overarching desired outcome of surgical discharge teaching is that the patient remains free of complications such as infection, with the other choices being teaching points that support achieving this primary goal.' },
      { q:'Head nurse of a CCU delegates a task to a senior nurse. What initial step must she implement?', opts:['Check the hospital policies for delegating tasks.','Explain the task','Negotiate with the senior nurse','Take the signature'], ans:0, exp:'Before delegating any task, the nurse must first verify that the task falls within the delegate’s scope of practice according to hospital policy and regulatory guidelines.' },
      { q:'Nurse notes some students with anorexia nervosa. What does she do?', opts:['Push them to eat','One-to-one supervision during eating','Let students eat with them the same meals','Permit the students to choose whether and when they want to eat.'], ans:2, exp:'Eating meals together with staff in a supportive, structured setting helps normalize eating behavior and provides supervision without being overly confrontational, which is more therapeutic than forced eating or unsupervised choice.' }
    ]
  },
  { name: 'Test 3', icon: 'fa-file-lines', color: '#7c3aed', questions: [
      { q:'20-week pregnant woman with sickle cell trait is worried about transmitting disease to baby. What should be the initial intervention?', opts:['Plan for fetal genetic screening','Educate mother disease is inactive','Discuss chances of genetic disease','Gather data about the other family members having the disease'], ans:3, exp:'Before genetic counseling or screening, the nurse should first gather a thorough family history to assess the father’s carrier status and other risk factors, since sickle cell disease requires two carrier genes to affect the fetus.' },
      { q:'A 40-year-old man admitted with pneumonia. Nurse obtains informed consent for chest CT with contrast. Which ethical principle underpins informed consent?', opts:['Autonomy','Non-maleficence','Beneficence','Respect'], ans:0, exp:'Informed consent is grounded in the principle of autonomy, which upholds a patient’s right to make voluntary, informed decisions about their own care.' },
      { q:'Patient complains of depression, muscle weakness, and continuous fatigue. Which deficiency is suspected?', opts:['Vitamin B','Vitamin D','Vitamin E','Vitamin K'], ans:1, exp:'Vitamin D deficiency commonly presents with fatigue, generalized muscle weakness, and mood changes including depressive symptoms, due to its role in muscle and neurologic function.' },
      { q:'What drug prevents recurrence of rheumatic fever?', opts:['Penicillin','Corticosteroids','Salicylates','Antacids'], ans:0, exp:'Long-term prophylactic penicillin is used to prevent recurrent group A streptococcal infections, which in turn prevents recurrence of rheumatic fever and further cardiac damage.' },
      { q:'A pregnant client reports experiencing vaginal spotting 3 days ago and again today. Which instruction should the nurse provide?', opts:['Rest and avoid strenuous activity while seeking prompt obstetric evaluation.','Prepare for an immediate digital vaginal examination.','Continue normal activities because light bleeding is expected during pregnancy.','Insert a tampon to determine the amount of bleeding.'], ans:0, exp:'Any vaginal bleeding in pregnancy warrants prompt obstetric evaluation to rule out serious causes such as placenta previa or abruption; the client should rest and avoid strenuous activity, and digital exams or tampons are avoided until previa is ruled out.' },
      { q:'During suctioning of a child, ensure that each pass of the suction catheter takes no more than:', opts:['5 seconds','10 seconds','15 seconds','20 seconds'], ans:0, exp:'In children, each suction pass should last no more than 5 seconds to minimize hypoxia, mucosal trauma, and vagal stimulation.' },
      { q:'The head nurse notices conflict among staff nurses and tries to solve it. She tells them that one side should give in for patient satisfaction. What type of conflict resolution is this?', opts:['Avoidance','Accommodation','Compromise','Collaboration'], ans:1, exp:'Accommodation involves one party yielding to the other’s needs, often used when preserving harmony or an outcome such as patient satisfaction is prioritized over one’s own position.' },
      { q:'When is the best time to perform postural drainage?', opts:['Before meals','After meals after half an hour','Before sleeping','Afternoon'], ans:1, exp:'Postural drainage should be scheduled away from mealtimes to reduce the risk of nausea, vomiting, and aspiration during positioning, so it is timed apart from meals rather than immediately before eating.' },
      { q:'To ensure the system is functioning effectively, the nurse should:', opts:['Observe for intermittent bubbling in the water seal chamber','Flush the chest tube every 4–6 hours','Maintain extreme lateral position','Strip the chest tubes'], ans:0, exp:'Intermittent bubbling (tidaling) in the water seal chamber with respiration confirms the chest tube system is patent and functioning, while continuous bubbling suggests an air leak.' },
      { q:'A community nurse is planning prenatal teaching for pregnant adolescents. Which strategy is most effective?', opts:['Open sessions for anyone','Posters for individual viewing','Group class sessions for pregnant adolescents together','One-to-one sessions for mothers and daughters'], ans:2, exp:'Group sessions with peers of the same age and life stage reduce stigma and encourage open discussion, making them the most effective teaching strategy for pregnant adolescents.' },
      { q:'A nurse is assessing a 2-year-old child whose parent reports that the child has been irritable and frequently awakens at night. Which additional behavior most strongly supports a suspected diagnosis of acute otitis media in this toddler?', opts:['Otorrhea','Rolling the head from side to side','Increased appetite','Frequent urination'], ans:0, exp:'Purulent ear drainage (otorrhea) is the most specific sign confirming acute otitis media, indicating tympanic membrane perforation from the underlying infection.' },
      { q:'How can infection be prevented if the nurse suspects bacteria inside the line?', opts:['Give antibiotics 3 times per day','Apply dressing with alcohol on central line','Use one lumen for TPN','Apply dressing with antibiotic TPN daily'], ans:1, exp:'Using an alcohol-based antiseptic during central line dressing changes helps disinfect the insertion site and surrounding skin, reducing catheter-related bloodstream infection.' },
      { q:'Location of rheumatoid arthritis', opts:['Wrist','Elbow','Knee','Shoulder'], ans:0, exp:'Rheumatoid arthritis classically involves the small joints symmetrically, especially the wrists and the proximal interphalangeal and metacarpophalangeal joints of the hands.' },
      { q:'A community health nurse is caring for a 17-year-old mother who is experiencing anemia and abnormal bleeding. The nurse needs to provide teaching about nutrition, medication adherence, warning signs, and follow-up care. Which method of health education is most appropriate?', opts:['Mass media education','Group education','Individual education','Community-wide education'], ans:2, exp:'Individualized education allows the nurse to tailor specific teaching about nutrition, medication adherence, warning signs, and follow-up to this patient’s unique clinical situation and comprehension level.' },
      { q:'A nurse is receiving a postoperative patient from the operating room after a surgical procedure performed under general anesthesia. The patient is drowsy and is being transferred to the surgical ward. Which nursing intervention is the priority?', opts:['Ensure the patient wears comfortable, loose-fitting clothing.','Keep the side rails of the bed raised.','Administer morphine for postoperative pain.','Encourage the patient to ambulate immediately.'], ans:1, exp:'A drowsy postanesthesia patient is at high risk for falls, so keeping the side rails raised for safety is the priority intervention during transport and early recovery.' },
      { q:'A nurse who normally works on a surgical unit is temporarily floated to a neurological unit. The charge nurse is assigning patients. Which patient is most appropriate to assign to the float nurse?', opts:['A patient with myasthenia gravis','A stable patient with a hip fracture who has a cast','A patient with a chronic neurological disease who requires oxygen therapy','A patient with an acute neurological condition requiring frequent neurological assessments'], ans:1, exp:'A float nurse unfamiliar with specialized neurological assessment should be assigned the most stable patient with a straightforward orthopedic need, such as a casted hip fracture, rather than patients requiring specialized neuro monitoring.' },
      { q:'A nurse is caring for a patient diagnosed with a herniated intervertebral disc. Which finding should the nurse recognize as a serious neurological complication of this condition?', opts:['Continuous muscle spasm','Impaired motor response','Cerebrovascular accident','Mild localized back discomfort'], ans:1, exp:'New or worsening motor weakness from a herniated disc signals significant nerve root or cauda equina compression, a serious complication requiring urgent evaluation to prevent permanent neurologic deficit.' },
      { q:'Patient takes anticoagulant daily. What is the common risk factor should the nurse be concerned about?', opts:['Infection','Bleeding','Pain','Numbness'], ans:1, exp:'Anticoagulant therapy impairs the clotting cascade, making bleeding the primary and most common risk the nurse must monitor for.' },
      { q:'What is the side effect of Depakote (Depakine)?', opts:['Nausea','Vomiting','Hair loss','Diarrhoea'], ans:2, exp:'Valproic acid (Depakote) is well known to cause hair loss (alopecia) as a distinctive adverse effect, in addition to gastrointestinal upset and hepatotoxicity.' },
      { q:'Patient complains that he has difficulty sleeping at night, needs 3 pillows behind his back. Lung sounds crackles & heart sounds confirm S3 gallop. What is the most likely diagnosis?', opts:['Asthma','Bronchitis','Left-sided heart failure','Right-sided heart failure'], ans:2, exp:'Orthopnea requiring multiple pillows, pulmonary crackles, and an S3 gallop together indicate fluid backing up into the lungs from left ventricular failure, characteristic of left-sided heart failure.' },
      { q:'A 29-year-old woman came for removal of stitches on her left cheek 9 days after an RTA. She covers her face, requests a female doctor. Wound is red, swollen, with pus points. She states she didn\'t wash her face since the accident and kept it covered so no one could see it. What is the most appropriate nursing diagnosis?', opts:['Hopelessness','Social isolation','Anxiety','Powerlessness'], ans:1, exp:'Deliberately covering her face, avoiding hygiene of the wound, and requesting privacy reflect voluntary withdrawal from social contact due to a disturbed body image, consistent with social isolation.' },
      { q:'A patient with atrial fibrillation has an order for 0.25 mg of drug X. Available supply/dose is 0.125 mg. Which dose is correct?', opts:['Dispense two tablets to the patient','Administer one tablet twice daily','Dispense one half tablet','Return tablets and re-order'], ans:0, exp:'0.25 mg divided by 0.125 mg per tablet equals two tablets for the ordered single dose.' },
      { q:'Position of patient for endoscopy on distal part of intestine?', opts:['Supine','Left lateral recumbent','Right lateral Sims','Prone'], ans:1, exp:'The left lateral (Sims) position follows the natural anatomic curve of the descending colon and sigmoid, facilitating scope passage during lower GI endoscopy.' },
      { q:'A 17-year-old woman in ED with fever, sore throat, hoarseness. Labs: Hb 120.5 (120–158), HCT 0.39 (0.36–0.47), RBC 4.0 (3.8–5.1 ×10²²/L), WBC 14.2 (4–10.5 ×10⁹/L). Throat culture: Beta-hemolytic streptococcus. Possible complication?', opts:['Cellulitis','Bacterial cholangitis','Infective endocarditis','Rheumatic heart disease'], ans:3, exp:'Untreated group A beta-hemolytic streptococcal pharyngitis can trigger an autoimmune response leading to rheumatic fever and subsequent rheumatic heart disease, a classic long-term complication.' },
      { q:'71-year-old male was diagnosed with subdural hematoma and underwent burr-hole craniotomy for subdural hematoma days ago. In order to detect signs of meningitis, which of the following indicates the patient has meningeal irritation?', opts:['Negative Kernig\'s signs','Positive Brudzinski\'s sign','Absence of nuchal rigidity','Glasgow Coma Scale of 14'], ans:1, exp:'A positive Brudzinski\'s sign (involuntary hip and knee flexion when the neck is flexed) indicates meningeal irritation and should raise suspicion for meningitis after a craniotomy.' },
      { q:'Patient with urine output less than 400 ml for 24 hours. What is the common diagnosis?', opts:['Dysurea','Polyurea','Oliguria','Anuria'], ans:2, exp:'Urine output below 400–500 mL in 24 hours is defined as oliguria, whereas anuria refers to output below approximately 100 mL in 24 hours.' },
      { q:'Patient admitted to ICU with tracheostomy and nasogastric tube. Vital signs are normal. The nurse was doing suction for the patient and yellow secretion came out. What is the cause?', opts:['Diet imbalance','Infection around tracheostomy','Iatrogenic infection','Cross infection'], ans:1, exp:'Yellow, purulent tracheal secretions typically indicate a respiratory infection around or below the tracheostomy site rather than a dietary or cross-contamination cause.' }
    ]
  },
  { name: 'Test 4', icon: 'fa-file-lines', color: '#14b8a6', questions: [
      { q:'A nurse is providing discharge teaching to a 12-year-old child who has been newly diagnosed with diabetes mellitus and prescribed insulin therapy. Which nursing intervention is most appropriate?', opts:['Teach only the parent how to administer the insulin injection.','Teach the child how to self-administer the insulin injection.','Instruct the child to visit the clinic for every insulin injection.','Tell the parent to administer all injections until the child reaches adulthood'], ans:1, exp:'By early adolescence, children have the fine motor and cognitive skills to learn self-injection, and teaching self-administration promotes independence and long-term self-management of a chronic condition.' },
      { q:'A 55-year-old male has a myocardial infarction requiring admission. He is being treated with an anticoagulant. The healthcare provider would be most concerned about which of the following?', opts:['Trouble sleeping','Nausea','An elevated creatinine','Purpura'], ans:3, exp:'Purpura is a visible sign of spontaneous bleeding into the skin and signals excessive anticoagulation, requiring prompt evaluation to prevent more serious hemorrhage.' },
      { q:'What is the organism that causes cervical cancer?', opts:['HPV','Herpes 2','HIV','Toxoplasmosis'], ans:0, exp:'Persistent infection with high-risk strains of human papillomavirus (HPV) is the primary cause of cervical cancer.' },
      { q:'During CPR of an admitted patient with cardiac arrest, a family member asks the nurse to be at the bedside to say final words. The nurse explains that the scene is disturbing and the medical team is doing its job. The family member insists on witnessing the resuscitation. What is the most appropriate action?', opts:['Allow family member to be at bedside','Wait and ask permission from team leader','Call security to escort family member out','Refuse because there is not enough space'], ans:1, exp:'Family presence during resuscitation should be coordinated with the code or team leader, who can authorize it and assign a support person to accompany the family member, balancing family wishes with the needs of the resuscitation team.' },
      { q:'During her break, the nurse was in the hospital cafeteria when she noticed a female colleague grasping her neck and unable to speak. Which maneuver should be performed?', opts:['Epley','Heimlich','Valsalva','Leopold\'s'], ans:1, exp:'Clutching the throat while unable to speak is the universal choking sign, indicating complete airway obstruction requiring the Heimlich maneuver (abdominal thrusts).' },
      { q:'A nurse makes a clinical judgment that an African-American male patient with a stressful job is more vulnerable to hypertension than White male patients in the same situation. What type of nursing diagnosis is this?', opts:['Actual','Risk','Possible','Wellness'], ans:1, exp:'Because the patient does not yet have hypertension but has identified risk factors that predispose him to developing it, this is a risk nursing diagnosis rather than an actual problem.' },
      { q:'To test corneal reflex, you should use:', opts:['Sterile gloves','Swab cotton','Cotton tape','Sterile tongue depressor'], ans:1, exp:'The corneal reflex is tested by lightly touching the cornea with a wisp of sterile cotton, which should elicit an involuntary blink.' },
      { q:'A nurse is assessing a patient with Raynaud syndrome affecting the toes. The patient reports that the toes become pale, then blue, especially during cold weather, and painful ulcerations have developed. Which factor most commonly triggers these symptoms?', opts:['Ascites','Palpitations','Digital sensitivity to cold','Increased fluid intake'], ans:2, exp:'Raynaud phenomenon is caused by exaggerated vasospasm of digital arteries triggered by cold exposure or emotional stress, producing the characteristic pallor-cyanosis color changes.' },
      { q:'Patient developed ascites which procedure will help relieve this condition:', opts:['Paracentesis','Hemodialysis','Lumber puncture','Pericardiocentesis'], ans:0, exp:'Paracentesis is the procedure used to drain excess peritoneal fluid, relieving pressure and discomfort caused by ascites.' },
      { q:'A patient fell in the bathroom and his left leg was fractured, in order to communicate information about the patient to the next shift. Which of the following documentation should be used by the nurse at the end of the shift?', opts:['Kardex record','Assignment record','Shift report','Incident report'], ans:0, exp:'The Kardex is a concise, continuously updated care summary used to communicate a patient\'s current status and care needs efficiently to the incoming shift.' },
      { q:'A 25-year-old patient with history of amenorrhea for two months was admitted for hydatidiform mole investigation. Which signs and symptoms would the nurse observe?', opts:['Hypotension','Hyperglycemia','Rapid uterine growth','Painful uterine contraction'], ans:2, exp:'Hydatidiform mole causes the uterus to grow much faster than expected for gestational age due to excessive trophoblastic tissue proliferation.' },
      { q:'A nurse is caring for an elderly bedridden patient who is dependent on staff for most activities of daily living. There is an order for standard precautions in the patient\'s chart. The patient\'s care plan includes feeding, washing hair with dry shampoo, brushing teeth and nail care. Which of the activities would require precaution?', opts:['Brushing teeth','Feeding','Hair washing','Nail care'], ans:0, exp:'Brushing teeth carries a risk of contact with blood or oral secretions from bleeding gums, so it requires standard precautions such as gloves, unlike the other listed non-invasive comfort activities.' },
      { q:'A primigravid client who is at 14 weeks gestation has been diagnosed with hyperemesis gravidarum. The nurse explains to the client that the condition is related to high levels of', opts:['Testosterone','Estrogen','Aldosterone','Progesterone'], ans:1, exp:'Elevated estrogen and hCG levels in early pregnancy are believed to contribute to the severe nausea and vomiting seen in hyperemesis gravidarum.' },
      { q:'Most common cause for acute renal failure?', opts:['Pyelonephritis','Tubular destruction','Urinary tract obstruction','Dehydration'], ans:3, exp:'Prerenal causes, particularly volume depletion from dehydration, are the most common cause of acute renal failure because reduced renal perfusion decreases glomerular filtration.' },
      { q:'A pregnant mother with sickle cell anemia is in labor. What should the nurse do to ensure the safety of the infant?', opts:['Control pain','Administer oxygen','Monitor fetal heart rate','Monitor maternal vital sign'], ans:2, exp:'Sickle cell crisis during labor increases the risk of placental insufficiency and fetal hypoxia, so continuous fetal heart rate monitoring is the most direct way to assess and ensure fetal wellbeing.' },
      { q:'HIV patient will be at risk for which life-threatening disease?', opts:['Pneumonia','Tuberculosis'], ans:0, exp:'Pneumocystis jirovecii pneumonia is the most common life-threatening opportunistic infection associated with advanced HIV/AIDS, making it a classic teaching point for HIV-related respiratory risk.' },
      { q:'36 weeks gestational with irregular painless contractions. This sign is called:', opts:['Hegar\'s sign','Braxton Hicks','True labor','Chadwick\'s sign'], ans:1, exp:'Braxton Hicks contractions are irregular, painless practice contractions that do not cause cervical change, distinguishing them from true labor.' },
      { q:'Pregnant woman has convulsions associated with eclampsia. Which drug is expected to administer?', opts:['Diazepam','Midazolam','Magnesium sulfate','Atropine'], ans:2, exp:'Magnesium sulfate is the drug of choice for preventing and treating eclamptic seizures due to its anticonvulsant and cerebral vasodilatory effects.' },
      { q:'A 21-year-old in oversized clothing presents to the hospital with dizziness and fainting. Hair and nails appear thin and dry; skin pale; sunken eye sockets; tenting skin. BMI = 16. She often induces vomiting. Blood pressure: 90/52 mmHg, Heart rate: 118/min, Respiratory rate: 26/min, Temperature: 37.2°C, O₂ saturation: 97%. ABG: HCO₃ 31 (22–28 mmol/L), PCO₂ 10.3 (4.7–6.0 kPa), PH 7.50 (7.36–7.45). Which nursing problem is most appropriate?', opts:['Impaired nutrition','Decreased cardiac output','Ineffective airway clearance','Ineffective breathing pattern'], ans:0, exp:'The overall clinical picture of an extremely low BMI, self-induced vomiting, and physical signs of malnutrition and dehydration reflect an eating disorder, making impaired nutrition the priority underlying nursing problem.' },
      { q:'You have learned that in babies and children with developmental dysplasia of the hip (DDH), the hip joint has not formed normally. Which is the most common form of DDH?', opts:['Acetabular dysplasia','Dislocation','Preluxion','Subluxion'], ans:0, exp:'Acetabular dysplasia, a shallow or malformed hip socket without frank displacement, is the mildest and most common presentation of developmental dysplasia of the hip.' },
      { q:'A woman should get her Pap smear test every:', opts:['6 months','1 year','3 years','5 years'], ans:2, exp:'Current guidelines recommend average-risk women undergo Pap smear screening every 3 years, balancing early detection of cervical dysplasia with avoiding overscreening.' },
      { q:'Which test should be performed to screen for cervical neoplasia during antenatal assessment?', opts:['Papanicolaou (PAP test)','Vaginal rectal culture','Rapid plasma regain test (RPR)','Venereal Disease Research Laboratory test (VDRL)'], ans:0, exp:'The Papanicolaou (Pap) smear is the standard screening test for cervical dysplasia and neoplasia and can be safely performed during routine antenatal assessment.' },
      { q:'Mother of nine children, three with congenital anomalies and one with Down syndrome. She is a primary school graduate, low financial status, and not using family planning. Primary health nurse refers her for counseling. Which model explains disability as a result of social injustice, stigma, or discrimination?', opts:['Health belief','Biomedical','Sociopolitical','Economic'], ans:2, exp:'The sociopolitical (or social) model of disability views disability as arising from societal barriers, stigma, and discrimination rather than solely from the individual\'s medical condition.' }
    ]
  },
  { name: 'Test 5', icon: 'fa-file-lines', color: '#f59e0b', questions: [
      { q:'A nurse working in medical unit is going out (removing) with droplet precaution measures in place. The following personal protective equipment; eyewear. What is the correct sequence for putting the equipment off?', opts:['Face Mask, Gown, Eyewear, and Gloves','Gown, Face Mask, Eyewear, and Gloves','Eyewear, Gloves, Face Mask, and Gown','Gloves, Eyewear, Gown, and Face Mask'], ans:3, exp:'When removing PPE, the most contaminated items are removed first: gloves, then eyewear or goggles, then the gown, and the mask or respirator is removed last since it protects the airway throughout the doffing process.' },
      { q:'A nurse working in medical unit is preparing to with droplet precaution measures in place. The following personal protective equipment; eyewear. What is the correct sequence for putting the equipment on?', opts:['Face Mask, Gown, Eyewear, and Gloves','Gown, Face Mask, Eyewear, and Gloves','Eyewear, Gloves, Face Mask, and Gown','Gloves, Gown, Face Mask, and Eyewear'], ans:1, exp:'PPE is donned starting with the gown, then the face mask, then eyewear, and gloves are put on last so they cover the gown cuffs and remain the cleanest barrier applied closest to patient contact.' },
      { q:'45-year-old woman is receiving chemotherapy for breast cancer. Two weeks after the initial treatment she telephoned the nurse at the cancer center and reports she has hair loss, nausea, tiredness, a body temperature is 38.1 C, and air hunger. Which finding most likely indicates she needs to report the clinic?', opts:['Pyrexia','Nausea','Hair loss','Air hunger'], ans:3, exp:'Air hunger signals a potentially life-threatening respiratory or cardiopulmonary compromise, such as neutropenic sepsis or a pulmonary complication, and requires immediate reporting, taking priority over the other expected chemotherapy side effects.' },
      { q:'A nurse is performing physical examination on the new born she notes that the baby has cephalhetoma this baby is risk to develop which of the following?', opts:['Sudden death','Pathological jaundice','Infected umbilical cord','Increased intracranial pressure'], ans:1, exp:'As the blood trapped beneath the periosteum in a cephalhematoma breaks down, it releases bilirubin, placing the newborn at increased risk for pathological jaundice.' },
      { q:'Head nurse has 200 patient and has 120 nurse what the percentage', opts:['80','60','50','40'], ans:1, exp:'120 divided by 200 equals 0.6, or 60%, representing the nurse-to-patient ratio expressed as a percentage.' },
      { q:'The mother brought her child to hospital then the child admitted to NICU. After leaving the mother for him. He started crying. What stage of anxiety separation?', opts:['Protest, despair, denial','Protest, despair and denial','Denial, protest, despair','Protest, denial, despair'], ans:0, exp:'The stages of separation anxiety in hospitalized young children progress in order from protest (crying, seeking the parent) to despair (withdrawal, hopelessness) and finally denial (detachment).' },
      { q:'Child with VSD. What is blood flow characteristic?', opts:['Mixes atrium blood','Decreased pulmonary blood flow','Increase pulmonary blood flow'], ans:2, exp:'A ventricular septal defect creates a left-to-right shunt due to higher pressure in the left ventricle, causing increased pulmonary blood flow and eventual pulmonary congestion if uncorrected.' },
      { q:'Neonatal mortality rate:', opts:['1:100','1:1000','1:100000','1:1000000'], ans:1, exp:'Neonatal mortality rate is conventionally expressed as deaths per 1,000 live births, so the ratio format 1:1000 matches how this statistic is typically reported.' },
      { q:'A 40 year-old woman present with painful leg cramps and muscle twitching, which wakens her at night. Her menstrual cycles are irregular and cause painful abdominal cramping. The hair, skin and nails appear dry and brittle. Test results: Calcium 2.09 (2.15–2.62 mmol/L), Phosphate, inorganic 1.69 (0.82–1.51 mmol/L), Magnesium 0.55 (0.7–1.0 mmol/L). What type of lifelong diet would be most beneficial for this patient?', opts:['Increased magnesium and vitamin C','Increased calcium and vitamin D','Increased dairy and iron','High protein and high calorie'], ans:1, exp:'The low calcium and neuromuscular irritability of cramps and twitching point to hypocalcemia, which is best managed with a diet increased in calcium along with vitamin D to enhance intestinal calcium absorption.' },
      { q:'A 33-year-old woman presented to the ER with general weakness. The laboratory investigation indicated vitamin D deficiency. Which of the following nutrients should be recommended as a good source of vitamin D?', opts:['Rice','Green tea','Orange juice','Fish liver oils'], ans:3, exp:'Fish liver oils, such as cod liver oil, are among the richest natural dietary sources of vitamin D.' },
      { q:'A nurse is about to perform venipuncture to initiate intravenous therapy with 0.9% normal saline solution. Before venipuncture, the nurse collects the required supplies and plans to perform certain actions. Which of the following actions is the most important?', opts:['Apply a tourniquet below the site of venipuncture','Place an arm board at the joint above the venipuncture','Apply cool compress over the vein to be used for venipuncture','Inspect 0.9% normal saline solution date of expiry'], ans:3, exp:'Before initiating any IV therapy, the nurse must verify the solution\'s expiration date and integrity as a fundamental medication and fluid safety check prior to infusion.' },
      { q:'Nurse said to patient: “Your identity will not be linked to responses.” What’s the ethical principle?', opts:['Privacy','Confidentiality','Anonymity','Debriefing'], ans:2, exp:'Anonymity means the participant\'s identity is never collected or known at all, distinguishing it from confidentiality, where identity is known but kept protected.' },
      { q:'As identified by Dr. Elizabeth Kübler-Ross, which stage of dying is characterized by the transition from “No, not me” to “Yes, me but…”?', opts:['Anger','Depression','Acceptance','Bargaining'], ans:3, exp:'Bargaining is the stage where the person moves from denial toward acknowledging the situation while attempting to negotiate more time or a better outcome, reflected in the shift from "not me" to "yes, me, but."' },
      { q:'Patient has sore throat, lesions in the mouth that didn’t cure, dysphagia, and weight loss. What’s the expected diagnosis?', opts:['Gastritis','Tonsillitis','Laryngeal cancer','Emphysema'], ans:2, exp:'Persistent throat symptoms with non-healing lesions, dysphagia, and unintentional weight loss are red-flag warning signs of laryngeal or head and neck malignancy requiring further investigation.' },
      { q:'Doctor writes a new PRN order to restrain a psychiatric patient who is very aggressive. Which of the following indicates what the nurse should do?', opts:['Call doctor while patient is aggressive so the doctor can do it himself','Apply the order one time only or if needed','Close patient’s room and don’t apply restraint','Express that it is not acceptable and complain to your supervisor'], ans:1, exp:'A PRN restraint order permits the nurse to apply the restraint once, based on clinical need, rather than continuously, consistent with safe and ethical use of restraints.' },
      { q:'The doctor orders 600 mL of a drug to infuse over 10 hours. How many minutes for 15 mL of the drug?', opts:['15','20','25','30'], ans:0, exp:'The infusion rate is 600 mL divided by 600 minutes, which equals 1 mL per minute, so 15 mL will infuse in 15 minutes.' },
      { q:'A 16-year-old girl developed an infection over the surface of the heart after having her nose pierced to place jewelry. On admission, she had developed pyrexia of 38°C, a heart murmur, and petechiae over the whole body. She was admitted and treated with IV antibiotics. The nurse explains that she is at high risk for re-infection and provides discharge teaching on preventive measures. Which of the following would most likely require prophylactic treatment?', opts:['A pelvic examination','Dental care','Bronchoscopy','Urinary catheterization'], ans:1, exp:'Dental procedures frequently cause transient bacteremia with oral streptococci, a leading cause of infective endocarditis, so patients with a history of endocarditis require antibiotic prophylaxis before dental care.' },
      { q:'The head nurse is too busy to give evaluation to her staff. She gave to everyone average evaluation. What is the evaluation type that the head nurse used?', opts:['Halo effect','Horn effect','Central tendency','Central effect'], ans:2, exp:'Central tendency error occurs when a rater avoids extreme ratings and scores everyone near the average, often due to insufficient time or effort to differentiate performance.' },
      { q:'A patient is attending a primary health clinic for regular checkup. He complains of constipation. After assessment, the nurse instructed him to consume bulk-forming foods. Which of the following is the best bulk-forming foods?', opts:['Fruit juice','Raw meat','Whole grains','Milk products'], ans:2, exp:'Whole grains are rich in insoluble fiber, which adds bulk to stool and stimulates peristalsis, making them the best bulk-forming food choice for constipation.' },
      { q:'5-year-old child was admitted with Nephrotic Syndrome. A nurse noticed that the child has slight facial puffiness with mild pitting edema on his hands and feet. There was no distended abdomen. What diet the nurse should order for the child?', opts:['High protein, high salt diet','Low protein, low fiber diet','Low protein, normal salt diet','Normal protein, low salt diet'], ans:3, exp:'In nephrotic syndrome, sodium is restricted to reduce fluid retention and edema, while protein intake is kept normal rather than high, which worsens proteinuria, or low, which risks malnutrition.' },
      { q:'What is drug that prevent recurrence of rheumatic fever?', opts:['Penicillin','Corticosteroids','Salicylate'], ans:0, exp:'Long-term prophylactic penicillin prevents recurrent group A streptococcal infection, the trigger for recurrent rheumatic fever episodes and progressive cardiac valve damage.' },
      { q:'A client was admitted in the Emergency Room due to mild metabolic acidosis associated with dehydration and potassium loss. The doctor administered Hartmann\'s (lactated Ringer\'s) intravenous fluid and electrolyte replacement. Which of the following elements of the lactated Ringer\'s solution highest value?', opts:['Calcium','Sodium','Potassium','Magnesium'], ans:1, exp:'Lactated Ringer\'s solution is formulated to approximate plasma electrolyte composition, and sodium (about 130 mEq/L) is present in by far the highest concentration among its electrolytes.' },
      { q:'The head nurse gives low evaluation to the nurse because of her late. What is the type of her evaluation effect?', opts:['Halo effect','Horn effect','Central tendency','Central effect'], ans:1, exp:'The horn effect occurs when one negative trait or behavior, such as chronic lateness, unfairly lowers the rater\'s overall evaluation of the employee.' },
      { q:'The head nurse gives high evaluation to the nurse because of her late. What is the type of her evaluation effect?', opts:['Halo effect','Horn effect','Central tendency','Central effect'], ans:0, exp:'The halo effect occurs when one favorable trait or impression causes the rater to overlook a negative behavior like lateness and score the overall evaluation favorably.' },
      { q:'A patient is attending a primary health clinic for a regular checkup. He complains of constipation. After assessment, the nurse instructs him to consume bulk-forming foods. Which of the following is the best bulk-forming food?', opts:['Fruit juice','Raw meat','Whole grains','Milk products'], ans:2, exp:'Whole grains provide insoluble fiber that adds bulk and promotes regular bowel movements, making them the best choice among bulk-forming foods for relieving constipation.' }
    ]
  }
]
